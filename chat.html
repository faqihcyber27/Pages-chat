<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 flex items-center gap-3 bg-purple-600">

  <button onclick="history.back()">←</button>

  <img :src="chat.avatar || defaultAvatar"
       class="w-10 h-10 rounded-full object-cover">

  <div class="flex-1">
    <p class="font-semibold">{{chat.name || chat.email}}</p>
    <p class="text-xs">
      <span v-if="onlineUsers.includes(chat.email)" class="text-green-300">
        online
      </span>
      <span v-else>offline</span>
    </p>
  </div>

</div>

<!-- CHAT -->
<div ref="chatBox" class="flex-1 overflow-auto p-3 space-y-2">

  <div v-for="(m,i) in messages"
       :key="i"
       :class="m.sender===user.email ? 'flex justify-end' : 'flex'">

    <div :class="[
      'px-4 py-2 rounded-2xl max-w-[70%]',
      m.sender===user.email ? 'bg-purple-600' : 'bg-white/10'
    ]">

      <div v-if="m.file">
        <img v-if="m.file_type && m.file_type.includes('image')"
             :src="m.file"
             class="rounded max-w-[200px]">
      </div>

      <div v-else>{{m.text}}</div>

      <div class="text-[10px] opacity-60 text-right mt-1">
        {{ formatTime(m.created_at) }}
      </div>

    </div>
  </div>

</div>

<!-- TYPING -->
<div v-if="typingUser" class="text-xs px-4 text-green-400">
  {{typingUser}} sedang mengetik...
</div>

<!-- INPUT -->
<div class="p-3 flex gap-2 bg-black/40">

  <input v-model="text"
         @input="sendTyping"
         @keyup.enter="send"
         class="flex-1 px-3 py-2 rounded bg-white/10 outline-none">

  <button @click="send"
    class="bg-purple-600 px-4 rounded">➤</button>

</div>

</div>

<script>
const WS = "wss://worker-chat.jihadwajib68.workers.dev/ws"

Vue.createApp({

data(){
return{
defaultAvatar:"https://ui-avatars.com/api/?name=User",
user:{},
chat:{},
messages:[],
text:'',
ws:null,
room:'',
typingUser:'',
onlineUsers:[],
wsGlobal:null
}
},

async mounted(){

this.user = JSON.parse(localStorage.getItem("user") || "{}")
this.chat = JSON.parse(localStorage.getItem("activeChat") || "{}")

if(!this.chat.email){
  alert("Chat tidak valid")
  return
}

this.room = [this.user.email, this.chat.email].sort().join("_")

// ================= WS ROOM =================
this.ws = new WebSocket(`${WS}?room=${this.room}`)

this.ws.onopen = () => {

  // INIT HISTORY
  this.ws.send(JSON.stringify({
    type:"init_messages",
    room:this.room
  }))

  // ONLINE
  this.ws.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))
}

this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // INIT HISTORY
  if(msg.type==="init_messages"){
    this.messages = msg.messages || []
    this.scrollBottom(true)
    return
  }

  // MESSAGE
  if(msg.type==="message"){

    if(msg.room !== this.room) return

    const last = this.messages[this.messages.length - 1]

    // 🔥 ANTI DOUBLE
    if(
      last &&
      last.text === msg.text &&
      last.sender === msg.sender &&
      Math.abs(new Date(last.created_at) - new Date(msg.created_at)) < 1000
    ){
      return
    }

    this.messages.push(msg)
    this.text=''
    this.scrollBottom()
    return
  }

  // TYPING
  if(msg.type==="typing"){
    if(msg.sender===this.user.email) return

    this.typingUser = msg.sender

    clearTimeout(this.typingTimeout)
    this.typingTimeout = setTimeout(()=>{
      this.typingUser=''
    },1000)
  }

}

// ================= GLOBAL =================
this.wsGlobal = new WebSocket(`${WS}?room=global`)

this.wsGlobal.onopen = ()=>{
  this.wsGlobal.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))
}

this.wsGlobal.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
  }
}

},

methods:{

send(){
  if(!this.text) return

  this.ws.send(JSON.stringify({
    type:"message",
    room:this.room,
    sender:this.user.email,
    text:this.text
  }))
},

sendTyping(){
  if(this.ws.readyState===1){
    this.ws.send(JSON.stringify({
      type:"typing",
      room:this.room,
      sender:this.user.email
    }))
  }
},

formatTime(t){
  if(!t) return ''
  const d = new Date(t)
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0')
},

scrollBottom(force=false){
  this.$nextTick(()=>{
    const el = this.$refs.chatBox
    if(!el) return

    const nearBottom =
      el.scrollHeight - el.scrollTop - el.clientHeight < 100

    if(nearBottom || force){
      el.scrollTop = el.scrollHeight
    }
  })
}

}

}).mount("#app")
</script>

</body>
</html>
