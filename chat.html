<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chat</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.glass {background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<div class="header p-4 flex items-center gap-3">
<button onclick="history.back()">←</button>
<img :src="chat.avatar" class="w-8 h-8 rounded-full">
<p>{{chat.name}}</p>
</div>

<div class="flex-1 overflow-auto p-3 space-y-2">

<div v-for="m in messages"
:class="m.me?'flex justify-end':'flex'">

<div :class="m.me?'bg-purple-600 px-4 py-2 rounded-2xl':'glass px-4 py-2 rounded-2xl'">
{{m.text}}
</div>

</div>

</div>

<div class="p-3 flex gap-2 glass">

<input v-model="text" class="flex-1 p-2 rounded bg-white/10">

<button @click="send" class="bg-purple-600 px-4 rounded">
Send
</button>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
chat:{},
messages:[],
text:'',
ws:null,
user:{}
}
},
async mounted(){
this.chat=JSON.parse(localStorage.getItem("activeChat"))
this.user=JSON.parse(localStorage.getItem("user"))

const res=await fetch(API+"/messages")
this.messages=await res.json()

this.ws=new WebSocket(API.replace("https","wss")+"/ws")

this.ws.onmessage=(e)=>{
this.messages.push(JSON.parse(e.data))
}
},
methods:{
send(){
this.ws.send(JSON.stringify({
user:this.user.name,
text:this.text
}))
this.messages.push({text:this.text,me:true})
this.text=''
}
}
}).mount("#app")
</script>

</body>
</html>
