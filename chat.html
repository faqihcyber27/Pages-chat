<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.me { background: #7c3aed; }
.them { background: rgba(255,255,255,0.08); }
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 flex items-center gap-3 bg-purple-600">
  <button onclick="history.back()">←</button>

  <img src="https://i.pravatar.cc/40"
       class="w-9 h-9 rounded-full">

  <div>
    <p class="font-semibold">{{chat.name || chat.email}}</p>
    <p class="text-xs opacity-70">online</p>
  </div>
</div>

<!-- CHAT AREA -->
<div ref="chatBox"
     class="flex-1 overflow-auto p-3 space-y-2">

  <div v-for="(m,i) in messages"
       :key="i"
       :class="m.sender===user.email ? 'flex justify-end' : 'flex'">

    <div :class="[
      'px-4 py-2 rounded-2xl max-w-[70%] transition-all duration-200',
      m.sender===user.email ? 'me' : 'them'
    ]">
      {{m.text}}
    </div>

  </div>

</div>

<!-- INPUT -->
<div class="p-3 flex gap-2 bg-black/40">

  <input v-model="text"
         @keyup.enter="send"
         placeholder="Type message..."
         class="flex-1 px-4 py-2 rounded-full bg-white/10 outline-none">

  <button v-if="text"
          @click="send"
          class="bg-purple-600 px-4 py-2 rounded-full">
    ➤
  </button>

  <button v-else class="text-xl">🎤</button>

</div>

</div>

<script>
const API = "https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
chat:{},
messages:[],
text:'',
ws:null,
room:'',
isConnected:false
}
},

async mounted(){

this.user = JSON.parse(localStorage.getItem("user"))
this.chat = JSON.parse(localStorage.getItem("activeChat"))

if(!this.chat || !this.chat.email){
  alert("Chat tidak valid")
  return
}

// 🔥 ROOM HARUS SAMA DI SEMUA USER
this.room = [this.user.email, this.chat.email].sort().join("_")
console.log("ROOM:", this.room)

// ===== LOAD HISTORY
const res = await fetch(API + "/messages?room=" + this.room)
const data = await res.json()

// 🔥 anti duplicate
this.messages = data.filter((v,i,a)=>
  i===a.findIndex(t=>t.id===v.id)
)

this.scrollBottom(true)

// ===== CONNECT WS
this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=" + this.room
)

this.ws.onopen = async () => {
  console.log("WS CONNECTED ✅")
  this.isConnected = true

  // 🔥 refresh kecil biar sinkron (anti delay user lain)
  setTimeout(async ()=>{
    const res = await fetch(API + "/messages?room=" + this.room)
    this.messages = await res.json()
    this.scrollBottom(true)
  },200)
}

this.ws.onerror = (e) => {
  console.log("WS ERROR ❌", e)
}

this.ws.onclose = () => {
  console.log("WS CLOSED ❌")
}

// 🔥 FIX ANTI DELAY
this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // ❗ skip pesan sendiri
  if(msg.sender === this.user.email) return

  // 🔥 push langsung (lebih cepat dari spread)
  this.messages.push(msg)

  // 🔥 paksa render cepat
  this.$forceUpdate?.()

  // 🔥 scroll smooth
  requestAnimationFrame(()=>{
    this.scrollBottom()
  })
}

},

methods:{

send(){

if(!this.text || !this.isConnected){
  console.log("WS belum connect ❌")
  return
}

// 🔥 tampil langsung (optimistic)
this.messages.push({
  sender:this.user.email,
  text:this.text,
  local:true
})

this.ws.send(JSON.stringify({
  room:this.room,
  sender:this.user.email,
  text:this.text
}))

this.text = ""
this.scrollBottom()
},

scrollBottom(force=false){
this.$nextTick(()=>{
  const el = this.$refs.chatBox

  const isNearBottom =
    el.scrollHeight - el.scrollTop - el.clientHeight < 100

  if(isNearBottom || force){
    el.scrollTo({
      top: el.scrollHeight,
      behavior: "smooth"
    })
  }
})
}

}

}).mount("#app")
</script>

</body>
</html>
