<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.me {background:#7c3aed;}
.them {background:rgba(255,255,255,0.1);}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 bg-purple-600 flex items-center gap-3">
<button onclick="history.back()">←</button>
<p>{{chat.email}}</p>
</div>

<!-- CHAT -->
<div ref="box" class="flex-1 overflow-auto p-3 space-y-2">

<div v-for="m in messages"
     :class="m.sender===user.email?'flex justify-end':'flex'">

  <div :class="[
    'px-3 py-2 rounded-xl max-w-[70%]',
    m.sender===user.email?'me':'them'
  ]">
    {{m.text}}
  </div>

</div>

</div>

<!-- INPUT -->
<div class="p-2 flex gap-2">

<input v-model="text"
class="flex-1 p-2 text-black rounded">

<button @click="send"
class="bg-purple-600 px-3 rounded">
Send
</button>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
chat:{},
messages:[],
text:'',
ws:null,
room:''
}
},

async mounted(){

this.user = JSON.parse(localStorage.getItem("user"))
this.chat = JSON.parse(localStorage.getItem("activeChat"))

if(!this.chat || !this.chat.email){
  alert("Chat tidak valid")
  return
}

// 🔥 FIX ROOM (WAJIB)
this.room = [this.user.email, this.chat.email].sort().join("_")

console.log("ROOM:", this.room)

// ===== LOAD HISTORY
const res = await fetch(API + "/messages?room=" + this.room)
this.messages = await res.json()

this.scroll()

// ===== CONNECT WS (FIX URL)
this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=" + this.room
)

this.ws.onopen = () => {
  console.log("WS CONNECTED ✅")
}

this.ws.onerror = (e) => {
  console.log("WS ERROR ❌", e)
}

this.ws.onmessage = (e) => {
  const msg = JSON.parse(e.data)

  this.messages.push(msg)
  this.scroll()
}

},

methods:{
send(){
if(!this.text || !this.ws) return

this.ws.send(JSON.stringify({
room:this.room,
sender:this.user.email,
text:this.text
}))

this.text=""
},

scroll(){
this.$nextTick(()=>{
this.$refs.box.scrollTop=this.$refs.box.scrollHeight
})
}
}
}).mount("#app")
</script>

</body>
</html>
