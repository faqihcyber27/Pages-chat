<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FIX CDN -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>

/* smooth scroll feel */
html {
  scroll-behavior: smooth;
}

/* bubble hover */
.me:hover, .them:hover {
  transform: scale(1.02);
}

.header-glow::before {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.2), transparent 60%);
  pointer-events:none;
}

body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
  position: relative;
}

/* subtle pattern */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
  background-size: 25px 25px;
  pointer-events: none;
}

.msg-enter {
  opacity: 0;
  transform: translateY(10px);
  animation: msgIn 0.3s ease forwards;
}

@keyframes msgIn {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.me {
  box-shadow: 0 6px 20px rgba(124,58,237,0.4);
}

.them {
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

.me { background: #7c3aed; }
.them { background: rgba(255,255,255,0.08); }
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- IMAGE PREVIEW -->
<div v-if="previewImage"
     class="fixed inset-0 bg-black/90 flex items-center justify-center z-50"
     @click="previewImage=null">
  <img :src="previewImage" class="max-w-full max-h-full rounded-lg">
</div>

<!-- PROFILE -->
<div v-if="showProfile"
class="fixed inset-0 bg-black/90 flex items-start justify-center pt-32 z-50"
@click="showProfile=false">

  <div @click.stop
       class="bg-[#020617] p-6 rounded-2xl text-center w-80">

    <img :src="chat.avatar || 'https://i.pravatar.cc/150'"
         @click="openImage(chat.avatar)"
         class="w-32 h-32 rounded-full mx-auto mb-4 object-cover">

    <p class="text-xl font-semibold">
      {{chat.name || chat.email}}
    </p>

    <p class="text-sm opacity-70 mt-2">
      {{chat.bio || 'Available'}}
    </p>

  </div>
</div>

<!-- HEADER -->
<div class="header-glow relative p-4 flex items-center gap-3 
  bg-gradient-to-r from-purple-600/80 via-indigo-500/70 to-pink-500/80
  backdrop-blur-xl border-b border-white/10 shadow-lg">

  <button onclick="history.back()">←</button>

  <img :src="chat.avatar || defaultAvatar"
       @click="showProfile=true"
       class="w-11 h-11 rounded-full object-cover ring-2 ring-white/20 shadow-md">

  <div class="flex-1">
    <p class="font-semibold">
      {{chat.name || chat.email}}
    </p>

    <p class="text-xs opacity-70">
      <span v-if="onlineUsers.includes(chat.email)"
        class="text-green-400">● online</span>
      <span v-else>
        {{ formatLastSeen(lastSeenMap[chat.email]) }}
      </span>
    </p>
  </div>

</div>

<!-- CHAT -->
<div ref="chatBox"
     class="flex-1 overflow-auto px-3 py-4 space-y-3 pb-24">

  <div v-for="(m,i) in messages"
       :key="i"
       :class="m.sender===user.email ? 'flex justify-end' : 'flex'">

    <div :class="[
      'msg-enter',
      'px-4 py-3 rounded-3xl max-w-[75%] shadow-md transition-all duration-300', m.sender===user.email
    ? 'bg-gradient-to-br from-purple-600 to-indigo-500 text-white shadow-purple-500/30'
    : 'bg-white/10 backdrop-blur text-white border border-white/10'
    ]">

      <div v-if="m.file">
        <img v-if="m.file_type && m.file_type.includes('image')"
             :src="m.file"
             @click="openImage(m.file)"
             class="rounded-lg max-w-[200px] cursor-pointer">

        <a v-else :href="m.file" download class="underline text-blue-400">
          {{m.file_name}}
        </a>
      </div>

      <div v-else>
        {{m.text}}
        <div class="text-[10px] text-right mt-1 opacity-60 flex justify-end gap-1">
          {{ formatTime(m.created_at) }}
        </div>
      </div>

    </div>
  </div>

</div>

<!-- TYPING -->
<div v-if="typingUser"
  class="text-xs px-4 pb-2 text-green-400 flex items-center gap-1">

  <span>{{typingUser}}</span>

  <span class="flex gap-1">
    <span class="w-1 h-1 bg-green-400 rounded-full animate-bounce"></span>
    <span class="w-1 h-1 bg-green-400 rounded-full animate-bounce delay-100"></span>
    <span class="w-1 h-1 bg-green-400 rounded-full animate-bounce delay-200"></span>
  </span>

</div>

<!-- INPUT -->
<div class="fixed bottom-4 left-1/2 -translate-x-1/2 w-[95%]
  flex gap-2 px-3 py-2 rounded-2xl
  bg-white/10 backdrop-blur-xl border border-white/10 shadow-lg">

  <input type="file" hidden ref="file" @change="sendFile">
  <button @click="$refs.file.click()">📎</button>

  <button @click="toggleEmoji">😊</button>

  <input v-model="text"
         @input="sendTyping"
         @keyup.enter="send"
         class="flex-1 px-4 py-2 rounded-full bg-white/10 backdrop-blur outline-none focus:ring-2 focus:ring-purple-500">

   <button v-if="text" @click="send"
    class="bg-gradient-to-r from-purple-600 to-indigo-500 px-4 rounded-full shadow-md active:scale-95 transition">
      ➤
    </button>

</div>

<!-- EMOJI -->
<div v-if="showEmoji" class="p-3 flex flex-wrap gap-2 bg-black/60">
  <span v-for="e in emojis" @click="addEmoji(e)">
    {{e}}
  </span>
</div>

</div>

<script>
const API = "https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
  defaultAvatar: "https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff",
user:{},
chat:{},
messages:[],
readMap:{},
deliveredMap:{},
text:'',
previewImage:null,
ws:null,
room:'',
showProfile:false,
showEmoji:false,
emojis:["😀","😂","😍","🔥","👍","🙏","😭","😎"],
typingUser:'',
onlineUsers:[],
lastSeenMap:{}
}
},

async mounted(){

this.user = JSON.parse(localStorage.getItem("user") || "{}")
this.chat = JSON.parse(localStorage.getItem("activeChat") || "{}")
await this.loadUserProfile()
if(!this.chat.avatar){
  this.chat.avatar = this.defaultAvatar
}

this.syncMessages()
setInterval(()=>this.syncMessages(),2000)

if(!this.chat.email){
  alert("Chat tidak valid")
  return
}

if(!this.chat.avatar){
  this.chat.avatar = this.defaultAvatar
}

this.room = [this.user.email, this.chat.email].sort().join("_")

await this.syncMessages(true)

this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=" + this.room
)

// ONLINE PING
setInterval(()=>{
  if(this.ws.readyState===1){
    this.ws.send(JSON.stringify({
      type:"online",
      user:this.user.email
    }))
  }
},1500)

// CLEAN ONLINE
setInterval(()=>{
  const now = Date.now()
  this.onlineUsers = this.onlineUsers.filter(u => now - u.time < 5000)
},2000)

// WS LISTENER
this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="message"){

  const last = this.messages[this.messages.length - 1]

  // 🔥 anti duplicate
  if(!last || (last.text !== msg.text || last.file !== msg.file)){
    this.messages.push(msg)
    this.text = ''
    this.scrollBottom()
  }
}
  // DELIVERED
if(msg.type==="delivered"){
  this.deliveredMap[msg.sender] = true
}

// READ
if(msg.type==="read"){
  this.readMap[msg.user] = true
}

  if(msg.type === "typing"){
  if(msg.sender === this.user.email) return  // 🚫 blok diri sendiri

  this.typingUser = msg.name

  setTimeout(()=>{
    this.typingUser = ''
  },1500)
}

  if(msg.type === "online_list"){
    this.onlineUsers = msg.users || []
  }
  
}

}, // ✅ PENTING

methods:{
markAsRead(){
  fetch(API+"/mark-read",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      room:this.room,
      user:this.user.email
    })
  })

  if(this.ws && this.ws.readyState===1){
    this.ws.send(JSON.stringify({
      type:"read",
      room:this.room,
      user:this.user.email
    }))
  }
},
formatTime(t){
  if(!t) return ''

  const d = new Date(t)

  const h = d.getHours().toString().padStart(2,'0')
  const m = d.getMinutes().toString().padStart(2,'0')

  return h + ':' + m
},

toggleEmoji(){
  this.showEmoji=!this.showEmoji
},
async loadUserProfile(){
  const res = await fetch(API + "/chats?email=" + this.user.email)
  const data = await res.json()

  const found = data.find(c => c.friend_email === this.chat.email)

  if(found){
    this.chat.avatar = found.friend_avatar
    this.chat.name = found.friend_name
    this.chat.bio = found.friend_bio
  }
},

async syncMessages(){
  const res = await fetch(API+"/messages?room="+this.room)
  this.messages = await res.json()

  this.scrollBottom(true) // 🔥 WAJIB
},

addEmoji(e){
  this.text+=e
},

openImage(src){
  this.previewImage=src
  this.showProfile=false
},

sendTyping(){
  if(this.ws.readyState===1){
    this.ws.send(JSON.stringify({
      type:"typing",
      sender:this.user.email,
      name:this.user.name
    }))
  }
},

sendFile(e){
  const file=e.target.files[0]
  if(!file) return

  const reader=new FileReader()

  reader.onload=()=>{
    const payload={
      type:"message",
      room:this.room,
      sender:this.user.email,
      file:reader.result,
      file_type:file.type,
      created_at: new Date().toISOString()
    }

    this.ws.send(JSON.stringify(payload))
    this.messages.push(payload)
  }

  reader.readAsDataURL(file)
},

send(){
  if(!this.text) return

  const msg={
    type:"message",
    room:this.room,
    sender:this.user.email,
    text:this.text,
    created_at: new Date().toISOString()
  }

  this.ws.send(JSON.stringify(msg))
  this.messages.push(msg)
  this.text = ''
  this.scrollBottom()
},

formatLastSeen(t){
  if(!t) return 'offline'

  const d=(Date.now()-new Date(t))/1000

  if(d<60) return 'just now'
  if(d<3600) return Math.floor(d/60)+' min ago'
  if(d<86400) return Math.floor(d/3600)+' hour ago'

  return new Date(t).toLocaleDateString()
},

scrollBottom(force=false){
  this.$nextTick(()=>{
    const el = this.$refs.chatBox

    const isNearBottom =
      el.scrollHeight - el.scrollTop - el.clientHeight < 100

    if(isNearBottom || force){
      el.scrollTo({
        top: el.scrollHeight,
        behavior:"smooth"
      })
    }
  })
}

}

}).mount("#app")
</script>

</body>
</html>
