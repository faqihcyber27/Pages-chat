<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}
.header {
  background: linear-gradient(135deg,#7c3aed,#4f46e5);
}
.neon {
  box-shadow: 0 0 10px #7c3aed,0 0 20px #7c3aed;
}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-5 rounded-b-3xl">
<h1 class="text-lg">Hi, {{user.name}}</h1>
<p class="text-sm opacity-70">Your Messages</p>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

  <!-- EMPTY STATE -->
  <div v-if="contacts.length === 0"
       class="h-full flex flex-col items-center justify-center text-center">

    <div class="text-5xl mb-4">💬</div>

    <h2 class="text-lg mb-2">No Chats Yet</h2>

    <p class="text-sm opacity-60 mb-4">
      Start conversation with your friends
    </p>

    <button class="bg-purple-600 px-4 py-2 rounded-full neon">
      + Add Friend
    </button>

  </div>

  <!-- CHAT LIST -->
  <div v-else class="space-y-3">

    <div v-for="c in contacts"
         @click="openChat(c)"
         class="glass p-3 rounded-xl flex items-center gap-3 cursor-pointer">

      <img :src="c.avatar" class="w-10 h-10 rounded-full">

      <div class="flex-1">
        <p>{{c.name}}</p>
        <p class="text-xs opacity-50">Last message...</p>
      </div>

      <div class="text-xs opacity-40">now</div>

    </div>

  </div>

</div>

</div>

<script>
Vue.createApp({
data(){
return{
user:{},
contacts:[] // kosong default
}
},
mounted(){
this.user=JSON.parse(localStorage.getItem("user")) || {name:"Guest"}
},
methods:{
openChat(c){
localStorage.setItem("activeChat",JSON.stringify(c))
location.href="chat.html"
}
}
}).mount("#app")
</script>

</body>
</html>
