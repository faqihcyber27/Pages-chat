<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- 🔥 FIX CDN -->
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}
.me { background: #7c3aed; }
.them { background: rgba(255,255,255,0.08); }
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- IMAGE PREVIEW -->
<div v-if="previewImage"
     class="fixed inset-0 bg-black/90 flex items-center justify-center z-50"
     @click="previewImage=null">
  <img :src="previewImage" class="max-w-full max-h-full rounded-lg">
</div>

<!-- PROFILE -->
<div v-if="showProfile"
class="fixed inset-0 bg-black/90 flex items-start justify-center pt-32 z-50"
@click="showProfile=false">

  <div @click.stop
       class="bg-[#020617] p-6 rounded-2xl text-center w-80">

    <img :src="chat.avatar || 'https://i.pravatar.cc/150'"
         @click="openImage(chat.avatar)"
         class="w-32 h-32 rounded-full mx-auto mb-4 object-cover">

    <p class="text-xl font-semibold">
      {{chat.name || chat.email}}
    </p>

    <p class="text-sm opacity-70 mt-2">
      {{chat.bio || 'Available'}}
    </p>

  </div>
</div>

<!-- HEADER -->
<div class="p-4 flex items-center gap-3 bg-purple-600">

  <button onclick="history.back()">←</button>

  <img :src="chat.avatar || defaultAvatar"
       @click="showProfile=true"
       class="w-10 h-10 rounded-full">

  <div class="flex-1">
    <p class="font-semibold">
      {{chat.name || chat.email}}
    </p>

    <p class="text-xs opacity-70">
      <span v-if="onlineUsers.some(u => u.user === chat.email)">
        online
      </span>
      <span v-else>
        {{ formatLastSeen(lastSeenMap[chat.email]) }}
      </span>
    </p>
  </div>

</div>

<!-- CHAT -->
<div ref="chatBox"
     class="flex-1 overflow-auto p-3 space-y-2">

  <div v-for="(m,i) in messages"
       :key="i"
       :class="m.sender===user.email ? 'flex justify-end' : 'flex'">

    <div :class="[
      'px-4 py-2 rounded-2xl max-w-[70%]',
      m.sender===user.email ? 'me' : 'them'
    ]">

      <div v-if="m.file">
        <img v-if="m.file_type && m.file_type.includes('image')"
             :src="m.file"
             @click="openImage(m.file)"
             class="rounded-lg max-w-[200px] cursor-pointer">

        <a v-else :href="m.file" download class="underline text-blue-400">
          {{m.file_name}}
        </a>
      </div>

      <div v-else>{{m.text}}</div>

    </div>
  </div>

</div>

<!-- TYPING -->
<div v-if="typingUser" class="text-xs px-3 pb-2 opacity-60">
  {{typingUser}} is typing...
</div>

<!-- INPUT -->
<div class="p-3 flex gap-2 bg-black/40">

  <input type="file" hidden ref="file" @change="sendFile">
  <button @click="$refs.file.click()">📎</button>

  <button @click="toggleEmoji">😊</button>

  <input v-model="text"
         @input="sendTyping"
         @keyup.enter="send"
         class="flex-1 px-4 py-2 rounded-full bg-white/10">

  <button v-if="text" @click="send">➤</button>

</div>

<!-- EMOJI -->
<div v-if="showEmoji" class="p-3 flex flex-wrap gap-2 bg-black/60">
  <span v-for="e in emojis" @click="addEmoji(e)">
    {{e}}
  </span>
</div>

</div>

<script>
const API = "https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
  defaultAvatar: "https://ui-avatars.com/api/?name=User&background=7c3aed&color=fff",
user:{},
chat:{},
messages:[],
text:'',
previewImage:null,
ws:null,
room:'',
showProfile:false,
showEmoji:false,
emojis:["😀","😂","😍","🔥","👍","🙏","😭","😎"],
typingUser:'',
onlineUsers:[],
lastSeenMap:{}
}
},

async mounted(){

this.user = JSON.parse(localStorage.getItem("user") || "{}")
this.chat = JSON.parse(localStorage.getItem("activeChat") || "{}")
await this.loadUserProfile
if(!this.chat.avatar){
  this.chat.avatar = this.defaultAvatar
}

this.syncMessages()
setInterval(()=>{
  if(!this.ws || this.ws.readyState !== 1){
    this.syncMessages()
  }
},5000)

if(!this.chat.email){
  alert("Chat tidak valid")
  return
}

if(!this.chat.avatar){
  this.chat.avatar = this.defaultAvatar
}

this.room = [this.user.email, this.chat.email].sort().join("_")

await this.syncMessages(true)

this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=" + this.room
)

// ONLINE PING
setInterval(()=>{
  if(this.ws.readyState===1){
    this.ws.send(JSON.stringify({
      type:"online",
      user:this.user.email
    }))
  }
},1500)

// CLEAN ONLINE
setInterval(()=>{
  const now = Date.now()
  this.onlineUsers = this.onlineUsers.filter(u => now - u.time < 5000)
},2000)

// WS LISTENER
this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="message"){

  const last = this.messages[this.messages.length - 1]

  // 🔥 anti duplicate
  if(!last || (last.text !== msg.text || last.file !== msg.file)){
    this.messages.push(msg)
    this.scrollBottom()
  }
}

  if(msg.type === "typing"){
  if(msg.sender === this.user.email) return  // 🚫 blok diri sendiri

  this.typingUser = msg.name

  setTimeout(()=>{
    this.typingUser = ''
  },1500)
}

  if(msg.type==="online"){
    const now = Date.now()

    this.onlineUsers = this.onlineUsers.filter(u => u.user !== msg.user)

    this.onlineUsers.push({
      user: msg.user,
      time: now
    })

    this.lastSeenMap[msg.user] = msg.last_seen
  }
}

}, // ✅ PENTING

methods:{

toggleEmoji(){
  this.showEmoji=!this.showEmoji
},
async loadUserProfile(){
  const res = await fetch(API + "/chats?email=" + this.user.email)
  const data = await res.json()

  const found = data.find(c => c.friend_email === this.chat.email)

  if(found){
    this.chat.avatar = found.friend_avatar
    this.chat.name = found.friend_name
    this.chat.bio = found.friend_bio
  }
},

async syncMessages(){
  const res = await fetch(API+"/messages?room="+this.room)
  this.messages = await res.json()

  this.scrollBottom(true) // 🔥 WAJIB
},

addEmoji(e){
  this.text+=e
},

openImage(src){
  this.previewImage=src
  this.showProfile=false
},

sendTyping(){
  if(this.ws.readyState===1){
    this.ws.send(JSON.stringify({
      type:"typing",
      sender:this.user.email,
      name:this.user.name
    }))
  }
},

sendFile(e){
  const file=e.target.files[0]
  if(!file) return

  const reader=new FileReader()

  reader.onload=()=>{
    const payload={
      type:"message",
      room:this.room,
      sender:this.user.email,
      file:reader.result,
      file_type:file.type
    }

    this.ws.send(JSON.stringify(payload))
    this.messages.push(payload)
  }

  reader.readAsDataURL(file)
},

send(){
  if(!this.text) return

  const msg={
    type:"message",
    room:this.room,
    sender:this.user.email,
    text:this.text
  }

  this.ws.send(JSON.stringify(msg))
  this.messages.push(msg)
  this.scrollBottom()
},

formatLastSeen(t){
  if(!t) return 'offline'

  const d=(Date.now()-new Date(t))/1000

  if(d<60) return 'just now'
  if(d<3600) return Math.floor(d/60)+' min ago'
  if(d<86400) return Math.floor(d/3600)+' hour ago'

  return new Date(t).toLocaleDateString()
},

async syncMessages(){
  const res = await fetch(API+"/messages?room="+this.room)
  this.messages = await res.json()

  this.scrollBottom(true) // 🔥 WAJIB
}

scrollBottom(force=false){
  this.$nextTick(()=>{
    const el = this.$refs.chatBox

    const isNearBottom =
      el.scrollHeight - el.scrollTop - el.clientHeight < 100

    if(isNearBottom || force){
      el.scrollTo({
        top: el.scrollHeight,
        behavior:"smooth"
      })
    }
  })
}

}

}).mount("#app")
</script>

</body>
</html>
