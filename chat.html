<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
.me {background:#7c3aed;}
.them {background:rgba(255,255,255,0.08);}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-4 flex items-center gap-3">
  <button onclick="history.back()">←</button>
  <div>
    <p class="font-semibold">{{chat.email}}</p>
    <p class="text-xs opacity-70">Online</p>
  </div>
</div>

<!-- CHAT AREA -->
<div ref="box" class="flex-1 overflow-auto p-3 space-y-2">

  <div v-for="m in messages"
       :class="m.sender===user.email?'flex justify-end':'flex'">

    <div :class="[
      'px-4 py-2 rounded-2xl max-w-[70%]',
      m.sender===user.email?'me':'them'
    ]">

      <p class="text-sm">{{m.text}}</p>

    </div>

  </div>

</div>

<!-- INPUT -->
<div class="p-3 flex gap-2 bg-black/30">

  <input v-model="text"
  @keyup.enter="send"
  placeholder="Type message..."
  class="flex-1 p-3 rounded-full text-black">

  <button @click="send"
  class="bg-purple-600 px-4 rounded-full">
  ➤
  </button>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
chat:{},
messages:[],
text:'',
ws:null,
room:'',
isConnected:false
}
},

async mounted(){

this.user = JSON.parse(localStorage.getItem("user"))
this.chat = JSON.parse(localStorage.getItem("activeChat"))

if(!this.chat || !this.chat.email){
  alert("Chat tidak valid")
  return
}

// 🔥 ROOM FIX (WAJIB)
this.room = [this.user.email, this.chat.email].sort().join("_")

console.log("ROOM:", this.room)

// ===== LOAD HISTORY
const res = await fetch(API + "/messages?room=" + this.room)
this.messages = await res.json()

this.scroll()

// ===== CONNECT WS
this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=" + this.room
)

this.ws.onopen = () => {
  console.log("WS CONNECTED ✅")
  this.isConnected = true
}

this.ws.onerror = (e) => {
  console.log("WS ERROR ❌", e)
}

this.ws.onmessage = (e) => {
  const msg = JSON.parse(e.data)
  this.messages.push(msg)
  this.scroll()
}

},

methods:{
send(){

// ❌ JANGAN KIRIM KALAU BELUM CONNECT
if(!this.text || !this.isConnected){
  console.log("WS belum connect")
  return
}

this.ws.send(JSON.stringify({
room:this.room,
sender:this.user.email,
text:this.text
}))

this.text=""
},

scroll(){
this.$nextTick(()=>{
this.$refs.box.scrollTop=this.$refs.box.scrollHeight
})
}
}
}).mount("#app")
</script>

</body>
</html>
