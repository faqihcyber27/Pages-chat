<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.chat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
  -webkit-user-select:none;
  user-select:none;
}
.chat-card:hover {transform: scale(1.02);}

@keyframes scaleIn{
  from{transform:scale(0.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>
</head>

<body>

<div id="app" class="h-full flex flex-col">

<div class="px-4 mt-4 text-xl font-semibold">Chats</div>

<div class="px-4 mt-3">
  <input v-model="search"
    placeholder="Search..."
    class="w-full p-3 rounded-xl bg-white/10 border border-white/10">
</div>

<!-- PINNED -->
<div v-if="pinnedChats.length" class="px-4 mt-4">
  <p class="text-xs opacity-60 mb-2">📌 Pinned</p>

  <div v-for="c in pinnedChats"
       @click="openChat(c)"
       class="chat-card p-3 mb-2 rounded-xl flex justify-between">

    <p>{{getName(c)}}</p>

    <button @click.stop="togglePin(c)" class="text-yellow-400">⭐</button>
  </div>
</div>

<!-- LIST -->
<div class="flex-1 overflow-auto px-4 mt-4"
     @scroll="cancelPress">

  <div v-for="c in normalChats"
     @click="handleClick(c)"
     @touchstart="startPress(c, $event)"
     @touchend="endPress"
     @touchmove="cancelPress"
     class="chat-card p-4 mb-3 rounded-2xl flex justify-between cursor-pointer">

    <div class="flex items-center gap-3">

      <img v-if="c.friend_avatar"
        :src="c.friend_avatar"
        class="w-10 h-10 rounded-full object-cover">

      <div v-else
        :style="{ background: getColor(getName(c)) }"
        class="w-10 h-10 rounded-full flex items-center justify-center">
        {{ getInitial(getName(c)) }}
      </div>

      <div>

        <p class="font-semibold flex items-center gap-2">
          {{ getName(c) }}
          <span v-if="isOnline(c.friend_email)"
            class="w-2 h-2 bg-green-400 rounded-full"></span>
        </p>

        <p class="text-sm"
          :class="typingUsers[c.friend_email] ? 'text-green-400' : 'opacity-60'">

          <span v-if="typingUsers[c.friend_email]">
            sedang mengetik...
          </span>

          <span v-else-if="c.last_message">
            {{c.last_message}}
          </span>

          <span v-else>No message</span>

        </p>

      </div>
    </div>

    <div class="text-right">

      <p class="text-xs opacity-50">
        {{formatTime(c.updated_at)}}
      </p>

      <button @click.stop="togglePin(c)"
        :class="isPinned(c.friend_email)?'text-yellow-400':'opacity-40'">
        ⭐
      </button>

      <div v-if="c.unread>0"
        class="bg-red-500 text-xs px-2 rounded-full mt-1">
        {{c.unread}}
      </div>

    </div>

  </div>

</div>

</div>

<!-- MODAL -->
<div v-if="selectedChat"
class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-gray-900 p-5 rounded-xl w-72 text-center animate-[scaleIn_.2s]">

    <p class="mb-4">
      Delete chat with {{selectedChat.friend_name}}?
    </p>

    <div class="flex gap-2">
      <button @click="deleteChat"
        class="bg-red-500 flex-1 p-2 rounded">
        Delete
      </button>

      <button @click="selectedChat=null"
        class="bg-gray-600 flex-1 p-2 rounded">
        Cancel
      </button>
    </div>

  </div>
</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
chats:[],
search:'',
onlineUsers:[],
typingUsers:{},
selectedChat:null,
pressTimer:null,
isLongPress:false,
wsRooms:{},
wsGlobal:null,
pinned: JSON.parse(localStorage.getItem("pinned")||"[]")
}
},

computed:{
pinnedChats(){
  return this.chats.filter(c=>this.pinned.includes(c.friend_email))
},
normalChats(){
  return this.chats.filter(c=>!this.pinned.includes(c.friend_email))
}
},

mounted(){

this.selectedChat = null
this.isLongPress = false

this.loadChats().then(()=>{
  this.initRoomSockets()
})

setInterval(()=>{ this.loadChats() },1500)

this.wsGlobal = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.wsGlobal.onopen = ()=>{
  this.wsGlobal.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))
}

this.wsGlobal.onmessage = (e)=>{
  const msg = JSON.parse(e.data)
  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
  }
}

},

methods:{

// ================= CLICK CONTROL =================
handleClick(c){
  if(this.isLongPress){
    this.isLongPress = false
    return
  }
  this.openChat(c)
},

// ================= LONG PRESS FIX =================
startPress(c, e){

  if(!e || !e.touches || e.touches.length !== 1) return

  this.isLongPress = false

  this.pressTimer = setTimeout(()=>{
    this.isLongPress = true
    this.selectedChat = c
    navigator.vibrate?.(50)
  },700)
},

endPress(){
  clearTimeout(this.pressTimer)
},

cancelPress(){
  clearTimeout(this.pressTimer)
},

// ================= DELETE =================
async deleteChat(){

  await fetch(API+"/delete-chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user1:this.user.email,
      user2:this.selectedChat.friend_email
    })
  })

  this.chats = this.chats.filter(c =>
    c.friend_email !== this.selectedChat.friend_email
  )

  this.selectedChat = null
},

// ================= SOCKET =================
initRoomSockets(){

this.chats.forEach(c=>{

const room = [this.user.email,c.friend_email].sort().join("_")
if(this.wsRooms[room]) return

const ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room="+room
)

ws.onmessage = (e)=>{
const msg = JSON.parse(e.data)

// typing
if(msg.type==="typing"){
  if(msg.sender===this.user.email) return
  this.typingUsers = {...this.typingUsers,[msg.sender]:true}
  setTimeout(()=>{
    const t = {...this.typingUsers}
    delete t[msg.sender]
    this.typingUsers = t
  },1000)
}

// message
if(!msg.type || msg.type==="message"){

  let friend = msg.sender === this.user.email
    ? msg.room.split("_").find(x=>x!==this.user.email)
    : msg.sender

  const chat = this.chats.find(x=>x.friend_email===friend)

  if(chat){
    chat.last_message = msg.text || "📎 File"
    chat.updated_at = msg.created_at

    if(msg.sender !== this.user.email){
      chat.unread = (chat.unread||0)+1
    }

    this.chats = [
      chat,
      ...this.chats.filter(x=>x.friend_email!==friend)
    ]
  }
}

}

this.wsRooms[room]=ws

})

},

async loadChats(){
const res = await fetch(API+"/chats?email="+this.user.email)
this.chats = await res.json()
},

openChat(c){
localStorage.setItem("activeChat", JSON.stringify({
  email:c.friend_email,
  name:c.friend_name
}))
location.href="chat.html"
},

getName(c){ return c.friend_name || c.friend_email },
getInitial(name){ return name.charAt(0).toUpperCase() },

getColor(name){
const colors=["#7c3aed","#4f46e5","#059669","#dc2626"]
let hash=0
for(let i=0;i<name.length;i++){
hash=name.charCodeAt(i)+((hash<<5)-hash)
}
return colors[Math.abs(hash)%colors.length]
},

isOnline(email){
  return this.onlineUsers.includes(email)
},

formatTime(t){
if(!t) return ''
const d=new Date(t)
return d.getHours().toString().padStart(2,'0')+':'+
       d.getMinutes().toString().padStart(2,'0')
}

}

}).mount("#app")
</script>

</body>
</html>
