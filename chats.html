<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.chat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.05);
  transition: 0.3s;
}
.chat-card:hover {
  transform: scale(1.02);
}
</style>
</head>

<body>

<div id="app" class="h-full flex flex-col">

<!-- TITLE -->
<div class="px-4 mt-4 text-xl font-semibold">Chats</div>

<!-- SEARCH -->
<div class="px-4 mt-3">
  <input v-model="search"
    placeholder="Search..."
    class="w-full p-3 rounded-xl bg-white/10 border border-white/10">
</div>

<!-- 📌 PINNED -->
<div v-if="pinnedChats.length" class="px-4 mt-4">
  <p class="text-xs opacity-60 mb-2">📌 Pinned</p>

  <div v-for="c in pinnedChats"
       @click="openChat(c)"
       class="chat-card p-3 mb-2 rounded-xl flex justify-between">

    <p>{{getName(c)}}</p>
    <span class="text-yellow-400">⭐</span>
  </div>
</div>

<!-- LIST -->
<div class="flex-1 overflow-auto px-4 mt-4">

  <div v-for="c in normalChats"
       @click="openChat(c)"
       class="chat-card p-4 mb-3 rounded-2xl flex justify-between cursor-pointer">

    <!-- LEFT -->
    <div class="flex items-center gap-3">

      <img v-if="c.friend_avatar"
        :src="c.friend_avatar"
        class="w-10 h-10 rounded-full object-cover">

      <div v-else
        :style="{ background: getColor(getName(c)) }"
        class="w-10 h-10 rounded-full flex items-center justify-center">
        {{ getInitial(getName(c)) }}
      </div>

      <div>

        <p class="font-semibold flex items-center gap-2">
          {{ getName(c) }}
          <span v-if="isOnline(c.friend_email)"
            class="w-2 h-2 bg-green-400 rounded-full"></span>
        </p>

        <p class="text-sm"
          :class="typingUsers[c.friend_email] ? 'text-green-400' : 'opacity-60'">

          <span v-if="typingUsers[c.friend_email]">
            sedang mengetik...
          </span>
          <span v-else>
            {{c.last_message}}
          </span>

        </p>

      </div>
    </div>

    <!-- RIGHT -->
    <div class="text-right">

      <p class="text-xs opacity-50">
        {{formatTime(c.updated_at)}}
      </p>

      <button @click.stop="togglePin(c)">
        ⭐
      </button>

      <div v-if="c.unread>0"
        class="bg-red-500 text-xs px-2 rounded-full mt-1">
        {{c.unread}}
      </div>

    </div>

  </div>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
chats:[],
search:'',
onlineUsers:[],
typingUsers:{},
wsRooms:{},
wsGlobal:null,
pinned: JSON.parse(localStorage.getItem("pinned")||"[]")
}
},

computed:{

pinnedChats(){
  return this.chats.filter(c=>this.pinned.includes(c.friend_email))
},

normalChats(){
  return this.chats.filter(c=>!this.pinned.includes(c.friend_email))
},

},

async mounted(){

// 🔔 izin notif
if("Notification" in window){
  Notification.requestPermission()
}

this.loadChats()

// GLOBAL WS
this.wsGlobal = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.wsGlobal.onopen = ()=>{
  this.wsGlobal.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))
}

this.wsGlobal.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="online_list"){
    this.onlineUsers = msg.users
  }
}

this.initRoomSockets()

},

methods:{

togglePin(c){
  const i = this.pinned.indexOf(c.friend_email)

  if(i>-1){
    this.pinned.splice(i,1)
  }else{
    this.pinned.push(c.friend_email)
  }

  localStorage.setItem("pinned", JSON.stringify(this.pinned))
},

initRoomSockets(){

this.chats.forEach(c=>{

const room = [this.user.email,c.friend_email].sort().join("_")

if(this.wsRooms[room]) return

const ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room="+room
)

ws.onmessage = (e)=>{
const msg = JSON.parse(e.data)

// typing
if(msg.type==="typing"){
  this.typingUsers[msg.sender]=true
  setTimeout(()=>delete this.typingUsers[msg.sender],800)
}

// message realtime
if(msg.type==="message"){

  const chat = this.chats.find(x=>x.friend_email===msg.sender)

  if(chat){
    chat.last_message = msg.text || "📎 File"
    chat.updated_at = msg.created_at
    chat.unread++

    // move top
    this.chats = this.chats.filter(x=>x!==chat)
    this.chats.unshift(chat)
  }

  // 🔔 NOTIFICATION
  if(document.hidden && Notification.permission==="granted"){
    new Notification("New Message",{
      body: msg.text || "File received"
    })
  }

}

// 🔥 READ SYNC
if(msg.type==="read"){
  const chat = this.chats.find(x=>x.friend_email===msg.user)
  if(chat) chat.unread = 0
}

}

this.wsRooms[room]=ws

})

},

async loadChats(){
const res = await fetch(API+"/chats?email="+this.user.email)
this.chats = await res.json()

this.$nextTick(()=>{
  this.initRoomSockets()
})
},

openChat(c){

const room = [this.user.email,c.friend_email].sort().join("_")

fetch(API+"/mark-read",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
room:room,
user:this.user.email
})
})

c.unread=0

localStorage.setItem("activeChat", JSON.stringify(c))
parent.location.href="chat.html"
},

getName(c){
return c.friend_name || c.friend_email
},

getInitial(name){
return name.charAt(0).toUpperCase()
},

getColor(name){
const colors=["#7c3aed","#4f46e5","#059669","#dc2626"]
let hash=0
for(let i=0;i<name.length;i++){
hash=name.charCodeAt(i)+((hash<<5)-hash)
}
return colors[Math.abs(hash)%colors.length]
},

isOnline(email){
return this.onlineUsers.includes(email)
},

formatTime(t){
if(!t) return ''
const d=new Date(t)
return d.getHours().toString().padStart(2,'0')+':'+
d.getMinutes().toString().padStart(2,'0')
}

}

}).mount("#app")
</script>

</body>
</html>
