<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.chat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.05);
  transition: 0.3s;
}
.chat-card:hover {
  transform: scale(1.02);
  box-shadow:
    0 12px 30px rgba(0,0,0,0.35),
    0 0 20px rgba(124,58,237,0.2);
}

.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5, #ec4899);
}
</style>

</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-5 shadow-lg">
  <h1 class="text-lg font-semibold">Hi, {{user.name}}</h1>
  <p class="text-xs opacity-70">Realtime Chat App</p>
</div>

<!-- TITLE -->
<div class="px-4 mt-4 text-xl font-semibold">Chats</div>

<!-- SEARCH -->
<div class="px-4 mt-3">
  <input v-model="search"
    placeholder="Search..."
    class="w-full p-3 rounded-xl bg-white/10 border border-white/10">
</div>

<!-- LIST -->
<div class="flex-1 overflow-auto px-4 mt-4">

  <div v-for="c in filteredChats"
       @click="openChat(c)"
       class="chat-card p-4 mb-3 rounded-2xl flex justify-between cursor-pointer">

    <!-- LEFT -->
    <div>

      <p class="font-semibold flex items-center gap-2">
        {{c.friend_name}}

        <!-- ONLINE -->
        <span v-if="isOnline(getFriendEmail(c))"
          class="w-2 h-2 bg-green-400 rounded-full"></span>
      </p>

      <!-- MESSAGE / TYPING -->
      <p class="text-sm mt-1"
         :class="typingUsers[getFriendEmail(c)] ? 'text-green-400' : 'opacity-60'">

        <span v-if="typingUsers[getFriendEmail(c)]">
          sedang mengetik...
        </span>

        <span v-else>
          {{c.last_message || 'No message'}}
        </span>

      </p>

    </div>

    <!-- RIGHT -->
    <div class="text-right">

      <p class="text-xs opacity-50">
        {{formatTime(c.updated_at)}}
      </p>

      <div v-if="c.unread > 0"
        class="bg-red-500 text-xs px-2 py-1 rounded-full mt-1">
        {{c.unread}}
      </div>

    </div>

  </div>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

if(!localStorage.getItem("user")){
  location.href="index.html"
}

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
chats:[],
search:'',

onlineUsers:[],
typingUsers:{},

wsGlobal:null,
wsRooms:{}
}
},

computed:{
filteredChats(){
return this.chats.filter(c=>{
const name = (c.friend_name || '').toLowerCase()
return name.includes(this.search.toLowerCase())
})
}
},

async mounted(){

await this.loadChats()

// fallback refresh
setInterval(()=>this.loadChats(),3000)

// GLOBAL WS
this.wsGlobal = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.wsGlobal.onopen = ()=>{
  this.wsGlobal.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  setInterval(()=>{
    if(this.wsGlobal.readyState===1){
      this.wsGlobal.send(JSON.stringify({
        type:"online",
        user:this.user.email
      }))
    }
  },5000)
}

this.wsGlobal.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
  }
}

this.initRoomSockets()

},

methods:{

initRoomSockets(){

  this.chats.forEach(c=>{

    const friend = c.friend_email
    const room = [this.user.email, friend].sort().join("_")

    if(this.wsRooms[room]) return

    const ws = new WebSocket(
      "wss://worker-chat.jihadwajib68.workers.dev/ws?room="+room
    )

    ws.onmessage = (e)=>{
      const msg = JSON.parse(e.data)

      // typing
      if(msg.type==="typing"){
        if(msg.sender === this.user.email) return

        this.typingUsers[msg.sender] = true

        setTimeout(()=>{
          delete this.typingUsers[msg.sender]
        },1500)
      }

      // new message → refresh
      if(msg.type==="message"){
        this.loadChats()
      }
    }

    this.wsRooms[room] = ws

  })

},

async loadChats(){
  this.chats = await (await fetch(API+"/chats?email="+this.user.email)).json()

  this.$nextTick(()=>{
    this.initRoomSockets()
  })
},

openChat(c){

  const room = [this.user.email, c.friend_email].sort().join("_")

  fetch(API+"/mark-read",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      room:room,
      user:this.user.email
    })
  })

  localStorage.setItem("activeChat", JSON.stringify({
    email:c.friend_email,
    name:c.friend_name,
    avatar:c.friend_avatar,
    bio:c.friend_bio
  }))

  location.href="chat.html"
},

getFriendEmail(c){
  return c.friend_email
},

isOnline(email){
  return this.onlineUsers.includes(email)
},

formatTime(t){
  if(!t) return ''
  const d=new Date(t)
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0')
}

}

}).mount("#app")
</script>

</body>
</html>
