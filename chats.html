<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.chat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  box-shadow:
    0 8px 24px rgba(0,0,0,0.25),
    inset 0 1px 0 rgba(255,255,255,0.05);
  transition: 0.3s;
}
.chat-card:hover {
  transform: scale(1.02);
}
</style>

</head>

<body>

<div id="app" class="h-full flex flex-col">

<!-- TITLE -->
<div class="px-4 mt-4 text-xl font-semibold">Chats</div>

<!-- SEARCH -->
<div class="px-4 mt-3">
  <input v-model="search"
    placeholder="Search..."
    class="w-full p-3 rounded-xl bg-white/10 border border-white/10">
</div>

<!-- LIST -->
<div class="flex-1 overflow-auto px-4 mt-4">

  <div v-for="c in filteredChats"
       @click="openChat(c)"
       class="chat-card p-4 mb-3 rounded-2xl flex justify-between cursor-pointer">

    <!-- LEFT -->
    <div class="flex items-center gap-3">

      <!-- AVATAR -->
      <div>
        <img v-if="c.friend_avatar"
          :src="c.friend_avatar"
          class="w-10 h-10 rounded-full object-cover">

        <div v-else
          :style="{ background: getColor(getName(c)) }"
          class="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold">
          {{ getInitial(getName(c)) }}
        </div>
      </div>

      <!-- INFO -->
      <div>

        <p class="font-semibold flex items-center gap-2">
          {{ getName(c) }}

          <span v-if="isOnline(getFriendEmail(c))"
            class="w-2 h-2 bg-green-400 rounded-full"></span>
        </p>

        <p class="text-xs opacity-50">
          <span v-if="!isOnline(getFriendEmail(c))">
            🕒 {{ formatLastSeen(c.friend_last_seen) }}
          </span>
          <span v-else class="text-green-400">
            online
          </span>
        </p>

        <p class="text-sm mt-1"
          :class="typingUsers[getFriendEmail(c)] ? 'text-green-400' : 'opacity-60'">

          <span v-if="typingUsers[getFriendEmail(c)]">
            sedang mengetik...
          </span>

          <span v-else>
            {{c.last_message || 'No message'}}
          </span>

        </p>

      </div>

    </div>

    <!-- RIGHT -->
    <div class="text-right flex flex-col items-end gap-1">

      <p class="text-xs opacity-50">
        {{formatTime(c.updated_at)}}
      </p>

      <button 
        @click.stop="toggleFav(c)"
        :class="isFav(c.friend_email) ? 'text-yellow-400' : 'opacity-40'"
        class="text-lg transition hover:scale-110">
        ⭐
      </button>

      <div v-if="c.unread > 0"
        class="bg-red-500 text-xs px-2 py-1 rounded-full">
        {{c.unread}}
      </div>

    </div>

  </div>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

if(!localStorage.getItem("user")){
  parent.location.href="index.html"
}

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
chats:[],
search:'',

onlineUsers:[],
typingUsers:{},

wsGlobal:null,
wsRooms:{},

favorites: JSON.parse(localStorage.getItem("favorites") || "[]")
}
},

computed:{
filteredChats(){

  const filtered = this.chats.filter(c=>{
    const name = this.getName(c).toLowerCase()
    return name.includes(this.search.toLowerCase())
  })

  return filtered.sort((a,b)=>{
    const aFav = this.isFav(a.friend_email) ? 1 : 0
    const bFav = this.isFav(b.friend_email) ? 1 : 0
    return bFav - aFav
  })
}
},

mounted(){

// ⚡ load awal (tanpa blocking)
this.loadChats()

// GLOBAL WS (ONLINE)
this.wsGlobal = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.wsGlobal.onopen = ()=>{
  this.wsGlobal.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  setInterval(()=>{
    if(this.wsGlobal.readyState===1){
      this.wsGlobal.send(JSON.stringify({
        type:"online",
        user:this.user.email
      }))
    }
  },5000)
}

this.wsGlobal.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
  }
}

this.initRoomSockets()

},

methods:{

getName(c){
  return c.friend_name || c.friend_email
},

getInitial(name){
  return name?.charAt(0).toUpperCase()
},

getColor(name){
  const colors = ["#7c3aed","#4f46e5","#059669","#dc2626","#ea580c","#0891b2"]
  let hash=0
  for(let i=0;i<name.length;i++){
    hash=name.charCodeAt(i)+((hash<<5)-hash)
  }
  return colors[Math.abs(hash)%colors.length]
},

toggleFav(c){
  const i = this.favorites.findIndex(f => f.email === c.friend_email)

  if(i > -1){
    this.favorites.splice(i,1)
  }else{
    this.favorites.unshift({
      email: c.friend_email,
      name: c.friend_name
    })
  }

  localStorage.setItem("favorites", JSON.stringify(this.favorites))
},

isFav(email){
  return this.favorites.find(f => f.email === email)
},

formatLastSeen(t){
  if(!t) return 'offline'
  const d=(Date.now()-new Date(t))/1000

  if(d<60) return 'just now'
  if(d<3600) return Math.floor(d/60)+' min ago'
  if(d<86400) return Math.floor(d/3600)+' hour ago'

  return new Date(t).toLocaleDateString()
},

initRoomSockets(){
  this.chats.forEach(c=>{
    const room = [this.user.email, c.friend_email].sort().join("_")

    if(this.wsRooms[room]) return

    const ws = new WebSocket(
      "wss://worker-chat.jihadwajib68.workers.dev/ws?room="+room
    )

    ws.onmessage = (e)=>{
      const msg = JSON.parse(e.data)

      // 🔥 typing realtime
      if(msg.type==="typing"){
        if(msg.sender === this.user.email) return
        this.typingUsers[msg.sender] = true
        setTimeout(()=>delete this.typingUsers[msg.sender],800)
      }

      // 🚀 MESSAGE REALTIME (NO FETCH)
      if(msg.type==="message"){

        const index = this.chats.findIndex(c =>
          this.getFriendEmail(c) === msg.sender
        )

        if(index !== -1){

          const chat = this.chats[index]

          chat.last_message = msg.text || (msg.file ? "📎 File" : "")
          chat.updated_at = msg.created_at
          chat.unread = (chat.unread || 0) + 1

          // pindah ke atas
          this.chats.splice(index,1)
          this.chats.unshift(chat)

        }else{
          this.loadChats()
        }
      }
    }

    this.wsRooms[room] = ws
  })
},

async loadChats(){
  const res = await fetch(API+"/chats?email="+this.user.email)
  this.chats = await res.json()

  this.$nextTick(()=>{
    this.initRoomSockets()
  })
},

openChat(c){
  const room = [this.user.email, c.friend_email].sort().join("_")

  fetch(API+"/mark-read",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      room:room,
      user:this.user.email
    })
  })

  localStorage.setItem("activeChat", JSON.stringify({
    email:c.friend_email,
    name:c.friend_name,
    avatar:c.friend_avatar,
    bio:c.friend_bio,
    last_seen:c.friend_last_seen
  }))

  parent.location.href="chat.html"
},

getFriendEmail(c){
  return c.friend_email
},

isOnline(email){
  return this.onlineUsers.includes(email)
},

formatTime(t){
  if(!t) return ''
  const d=new Date(t)
  return d.getHours().toString().padStart(2,'0') + ':' +
         d.getMinutes().toString().padStart(2,'0')
}

}

}).mount("#app")
</script>

</body>
</html>
