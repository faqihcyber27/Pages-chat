<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

.search-bar {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

.contact-card {
  background: rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.25s;
}

.contact-card:hover {
  transform: translateY(-3px) scale(1.02);
}

.action-btn {
  background: rgba(255,255,255,0.06);
  padding: 8px;
  border-radius: 12px;
}

.delete-btn:hover {
  background: rgba(255,0,0,0.2);
}

.online-dot {
  width:8px;height:8px;background:#22c55e;border-radius:999px;
}

.add-btn {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
}

.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,30,0.9);
  padding: 12px 20px;
  border-radius: 14px;
  opacity: 0;
  transition: 0.3s;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<div id="app" class="p-4">

<h1 class="text-2xl mb-3">Contacts</h1>

<button @click="showModal=true"
  class="add-btn px-4 py-2 rounded-xl text-sm mb-4">
  + Add Friend
</button>

<input v-model="search"
  placeholder="Search..."
  class="search-bar w-full p-3 rounded-full mb-4">

<!-- LIST -->
<div v-for="c in filteredContacts"
     :key="c.email"
     class="contact-card p-4 mb-3 rounded-2xl flex justify-between">

  <div @click="startChat(c)" class="flex gap-3 cursor-pointer">

    <img :src="c.avatar || defaultAvatar"
      class="w-10 h-10 rounded-full">

    <div>
      <p class="font-semibold">
        {{c.name}}
        <span v-if="isOnline(c.email)" class="online-dot inline-block ml-1"></span>
      </p>
      <p class="text-xs opacity-50">{{c.bio || 'Available'}}</p>
    </div>

  </div>

  <div class="flex gap-2">
    <button @click.stop="startChat(c)" class="action-btn">💬</button>
    <button @click.stop="openDelete(c)" class="action-btn delete-btn">🗑</button>
  </div>

</div>

<!-- ADD -->
<div v-if="showModal" class="fixed inset-0 bg-black/70 flex items-center justify-center">
  <div class="bg-white/10 p-5 rounded-xl w-80">
    <h2 class="mb-3">Add Friend</h2>

    <input v-model="friendEmail"
      class="p-3 w-full mb-3 bg-white/10 rounded">

    <div class="flex gap-2">
      <button @click="sendRequest" class="bg-purple-600 flex-1 p-2 rounded">
        Send
      </button>
      <button @click="showModal=false" class="bg-gray-600 flex-1 p-2 rounded">
        Close
      </button>
    </div>
  </div>
</div>

<!-- DELETE -->
<div v-if="selectedContact"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

  <div class="bg-white/10 p-5 rounded-xl w-72 text-center">
    <p class="mb-4">Delete {{selectedContact.name}}?</p>

    <div class="flex gap-2">
      <button @click="deleteContact" class="bg-red-500 flex-1 p-2 rounded">
        Delete
      </button>
      <button @click="selectedContact=null" class="bg-gray-600 flex-1 p-2 rounded">
        Cancel
      </button>
    </div>
  </div>

</div>

<!-- TOAST -->
<div :class="['toast', showToast ? 'show' : '']">
  {{toastMessage}}
</div>

</div>

<script>
const WS="wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
contacts:[],
search:'',
friendEmail:'',
showModal:false,
selectedContact:null,
ws:null,
onlineUsers:[],
showToast:false,
toastMessage:"",
defaultAvatar:"https://ui-avatars.com/api/?name=User"
}
},

computed:{
filteredContacts(){
return this.contacts.filter(c =>
  c.name?.toLowerCase().includes(this.search.toLowerCase())
)
}
},

mounted(){

this.ws = new WebSocket(WS)

this.ws.onopen = ()=>{
  this.ws.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  this.ws.send(JSON.stringify({
    type:"init_contacts",
    user:this.user.email
  }))
}

this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // INIT
  if(msg.type==="init_contacts"){
    this.contacts = msg.contacts || []
    return
  }

  // ONLINE
  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
    return
  }

  // CONTACT UPDATE
  if(msg.type==="contact_update"){
    this.ws.send(JSON.stringify({
      type:"init_contacts",
      user:this.user.email
    }))
    return
  }

  // PROFILE UPDATE
  if(msg.type==="profile_update"){
    this.contacts = this.contacts.map(c=>{
      if(c.email===msg.user.email){
        return {...c,...msg.user}
      }
      return c
    })
    return
  }

  // REQUEST ACCEPT
  if(msg.type==="request_accepted"){
    if(msg.to===this.user.email){
      this.showToastMsg(msg.name+" menerima pertemanan 🎉")
    }
  }

}

},

methods:{

showToastMsg(msg){
  this.toastMessage=msg
  this.showToast=true
  setTimeout(()=>this.showToast=false,2000)
},

sendRequest(){
  if(!this.friendEmail) return

  this.ws.send(JSON.stringify({
    type:"send_request",
    from_email:this.user.email,
    to_email:this.friendEmail
  }))

  this.showModal=false
  this.friendEmail=''
  this.showToastMsg("Request sent 🚀")
},

deleteContact(){

  this.ws.send(JSON.stringify({
    type:"delete_contact",
    user_email:this.user.email,
    friend_email:this.selectedContact.email
  }))

  this.contacts = this.contacts.filter(c =>
    c.email !== this.selectedContact.email
  )

  this.selectedContact=null
  this.showToastMsg("Contact deleted 🗑")
},

startChat(c){
  localStorage.setItem("activeChat", JSON.stringify({
    email:c.email,
    name:c.name,
    avatar:c.avatar
  }))
  window.top.location.href="chat.html"
},

openDelete(c){
  this.selectedContact=c
},

isOnline(email){
  return this.onlineUsers.includes(email)
}

}

}).mount("#app")
</script>

</body>
</html>
