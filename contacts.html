<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.contact-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
}
.contact-card:hover {transform: scale(1.02);}

.action-btn {
  background: rgba(255,255,255,0.08);
  padding: 6px 8px;
  border-radius: 10px;
  transition: 0.2s;
}
.action-btn:hover {
  background: rgba(255,255,255,0.15);
  transform: scale(1.1);
}

@keyframes scaleIn{
  from{transform:scale(0.8);opacity:0}
  to{transform:scale(1);opacity:1}
}
</style>

</head>

<body>

<div id="app" class="p-4">

<h1 class="text-xl mb-3">Contacts</h1>

<button @click="showModal=true"
class="mb-3 bg-purple-600 px-3 py-2 rounded">
+ Add Friend
</button>

<input v-model="search" placeholder="Search..."
class="w-full mb-4 p-3 rounded-xl bg-white/10 border border-white/10">

<!-- CONTACT LIST -->
<div v-for="c in filteredContacts"
     @click="startChat(c)"
     @touchstart="startPress(c)"
     @touchend="cancelPress"
     class="contact-card p-3 mb-3 rounded-2xl flex items-center justify-between cursor-pointer">

  <div class="flex items-center gap-3">

    <img :src="c.avatar || 'https://i.pravatar.cc/40'"
      class="w-10 h-10 rounded-full object-cover">

    <div>
      <p class="font-medium flex items-center gap-2">
        {{c.name}}

        <span v-if="isOnline(c.email)"
          class="text-[10px] bg-green-500/20 text-green-400 px-2 py-[2px] rounded-full">
          🟢 Online
        </span>

        <span v-else class="text-[10px] opacity-50">
          Offline
        </span>
      </p>

      <p class="text-xs opacity-50 truncate max-w-[150px]">
        {{ c.bio || 'Available' }}
      </p>
    </div>

  </div>

  <!-- ACTION -->
  <div class="flex gap-2">

    <button @click.stop="startChat(c)" class="action-btn">💬</button>

    <button @click.stop="viewProfile(c)" class="action-btn">👁</button>

  </div>

</div>

<!-- ADD FRIEND -->
<div v-if="showModal"
class="fixed inset-0 bg-black/70 flex items-center justify-center">

  <div class="bg-white/10 p-5 rounded-xl w-80">

    <h2 class="mb-3">Add Friend</h2>

    <input v-model="friendEmail" placeholder="Email"
    class="p-3 w-full mb-3 bg-white/10 rounded">

    <div class="flex gap-2">
      <button @click="sendRequest"
      class="bg-purple-600 flex-1 p-2 rounded">
      Send
      </button>

      <button @click="showModal=false"
      class="bg-gray-600 flex-1 p-2 rounded">
      Close
      </button>
    </div>

  </div>

</div>

<!-- PROFILE MODAL -->
<div v-if="selectedProfile"
class="fixed inset-0 bg-black/60 flex items-center justify-center z-50">

  <div class="bg-white/10 backdrop-blur-xl border border-white/10
              p-6 rounded-2xl w-80 text-center animate-[scaleIn_.2s]">

    <img :src="selectedProfile.avatar || 'https://i.pravatar.cc/150'"
      class="w-24 h-24 rounded-full mx-auto mb-3 object-cover border border-white/20">

    <h2 class="text-lg font-semibold">
      {{selectedProfile.name}}
    </h2>

    <p class="text-sm mt-1"
       :class="isOnline(selectedProfile.email) ? 'text-green-400' : 'opacity-50'">
      {{ isOnline(selectedProfile.email) ? '🟢 Online' : 'Offline' }}
    </p>

    <p class="text-sm opacity-60 mt-2">
      {{selectedProfile.bio || 'No bio'}}
    </p>

    <div class="flex gap-2 mt-4">

      <button @click="startChat(selectedProfile)"
        class="bg-purple-600 flex-1 p-2 rounded-lg">
        Chat
      </button>

      <button @click="selectedProfile=null"
        class="bg-gray-600 flex-1 p-2 rounded-lg">
        Close
      </button>

    </div>

  </div>
  <div v-if="selectedContact"
    class="fixed inset-0 bg-black/60 flex items-center justify-center">

    <div class="glass p-5 rounded-xl w-72 text-center">

      <p class="mb-4">Delete {{selectedContact.name}}?</p>

    <div class="flex gap-2">
      <button @click="deleteContact"
        class="bg-red-500 flex-1 p-2 rounded">Delete</button>

      <button @click="selectedProfile=null"
        class="bg-gray-600 flex-1 p-2 rounded">Cancel</button>
    </div>

  </div>
</div>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

if(!localStorage.getItem("user")){
  location.href="index.html"
}

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
contacts:[],
search:'',
friendEmail:'',
showModal:false,
onlineUsers:[],
ws:null,
selectedProfile:null
}
},

computed:{
filteredContacts(){
return this.contacts.filter(c =>
  c.name?.toLowerCase().includes(this.search.toLowerCase())
)
}
},

async mounted(){

this.loadContacts()

// 🔥 GLOBAL ONLINE (SAMA DENGAN CHAT)
this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.ws.onopen = ()=>{
  this.ws.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  setInterval(()=>{
    if(this.ws.readyState===1){
      this.ws.send(JSON.stringify({
        type:"online",
        user:this.user.email
      }))
    }
  },5000)
}

this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
  }
}

},

methods:{

async loadContacts(){
  this.contacts = await (await fetch(API+"/contacts?email="+this.user.email)).json()
},

async sendRequest(){
  await fetch(API+"/send-request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      from_email:this.user.email,
      to_email:this.friendEmail
    })
  })

  this.showModal=false
  alert("Request sent")
},

// 🔥 FIX UTAMA (SINKRON CHAT.HTML)
startChat(c){

  localStorage.setItem("activeChat", JSON.stringify({
    email: c.email,
    name: c.name,
    avatar: c.avatar || null,
    bio: c.bio || "",
    last_seen: c.last_seen || null
  }))

  setTimeout(()=>{
    window.top.location.href = "chat.html"
  },100)
},

async deleteContact(){
  await fetch(API+"/delete-contact",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
    user_email:this.user.email,
    friend_email:this.selectedContact.email
    })
  })
  this.selectedContact=null
  this.loadContacts()
},

viewProfile(c){
  this.selectedProfile = c
},

startPress(c){
  this.pressTimer=setTimeout(()=>{
  this.selectedContact=c
  },600)
},

cancelPress(){
  clearTimeout(this.pressTimer)
},

isOnline(email){
  return this.onlineUsers.includes(email)
}

}

}).mount("#app")
</script>

</body>
</html>
