<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<link rel="manifest" href="/manifest.json">

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 0 0 24px 24px;
  box-shadow:
    0 10px 40px rgba(124,58,237,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px;
}

.nav-btn {
  flex: 1;
  padding: 10px 0;
}

.active { color: #a78bfa; }

.chat-card {
  background: rgba(255,255,255,0.05);
  border-radius: 16px;
  padding: 14px;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center mx-2 mt-2">
    <div class="flex items-center gap-3">
      <img id="avatar" class="w-11 h-11 rounded-full">
      <div>
        <h1 id="username"></h1>
        <p class="text-xs opacity-70">Realtime Chat</p>
      </div>
    </div>
    <button onclick="toggleRequests()">🔔</button>
  </div>

  <!-- IFRAME -->
  <iframe id="frame" class="hidden flex-1 w-full border-0"></iframe>

  <!-- CHATS -->
  <div id="app" class="flex-1 overflow-auto">

    <div class="px-4 mt-4 text-xl">Chats</div>

    <div class="px-4 mt-3">
      <input v-model="search"
        placeholder="Search..."
        class="w-full p-3 rounded-xl bg-white/10">
    </div>

    <div class="px-4 mt-4">

      <div v-for="c in chats"
           @click="openChat(c)"
           class="chat-card mb-3 flex justify-between cursor-pointer">

        <div class="flex gap-3 items-center">

          <img v-if="c.friend_avatar"
            :src="c.friend_avatar"
            class="w-10 h-10 rounded-full">

          <div v-else class="w-10 h-10 rounded-full flex items-center justify-center bg-purple-600">
            {{ getInitial(c.friend_name || c.friend_email) }}
          </div>

          <div>
            <p>{{ c.friend_name || c.friend_email }}</p>
            <p class="text-sm opacity-60">{{ c.last_message }}</p>
          </div>
        </div>

        <div class="text-right">
          <p class="text-xs opacity-50">{{ formatTime(c.updated_at) }}</p>

          <div v-if="c.unread>0"
            class="bg-red-500 text-xs px-2 rounded-full">
            {{c.unread}}
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- NAVBAR -->
  <div class="navbar flex text-center text-xl">
    <button onclick="navigate('chats.html', this)" class="nav-btn active">💬</button>
    <button onclick="navigate('contacts.html', this)" class="nav-btn">👤</button>
    <button onclick="navigate('profile.html', this)" class="nav-btn">⚙️</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"))

document.getElementById("username").innerText = "Hi, " + user.name
document.getElementById("avatar").src =
  user.avatar || "https://ui-avatars.com/api/?name=" + user.name

function navigate(page, el){

  const frame = document.getElementById("frame")
  const chat = document.getElementById("app")

  document.querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"))

  el.classList.add("active")

  if(page === "chat"){
    chat.style.display = "block"
    frame.classList.add("hidden")
  }else{
    chat.style.display = "none"
    frame.classList.remove("hidden")
    frame.src = page
  }
}

Vue.createApp({

data(){
return{
user,
chats:[],
ws:null
}
},

mounted(){

this.ws = new WebSocket("wss://worker-chat.jihadwajib68.workers.dev/ws?room=global")

this.ws.onopen = ()=>{
  this.ws.send(JSON.stringify({
    type:"init_chats",
    user:this.user.email
  }))
}

this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  if(msg.type === "init_chats"){
    this.chats = msg.chats || []
  }

  if(msg.type === "message"){
    this.ws.send(JSON.stringify({
      type:"init_chats",
      user:this.user.email
    }))
  }
}

},

methods:{

openChat(c){
  localStorage.setItem("activeChat", JSON.stringify(c))
  location.href = "chat.html"
},

getInitial(name){
  return name.charAt(0).toUpperCase()
},

formatTime(t){
  if(!t) return ''
  const d=new Date(t)
  return d.getHours()+':'+d.getMinutes()
}

}

}).mount("#app")
</script>

</body>
</html>
