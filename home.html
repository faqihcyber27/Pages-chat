<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5, #ec4899);
  position: relative;
  overflow: hidden;
}
.header::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at top left, rgba(255,255,255,0.2), transparent 60%);
}

/* NAVBAR */
.navbar {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border-top: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 -10px 30px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
}

.nav-btn {
  position: relative;
  padding: 10px 16px;
  border-radius: 14px;
  transition: 0.25s;
}
.active {
  color: #a78bfa;
}
.active::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: rgba(124,58,237,0.25);
  filter: blur(10px);
  z-index:-1;
}
.nav-btn:active {
  transform: scale(0.9);
}

#frame {
  transition: opacity 0.25s ease;
}

/* 💎 GLASS MODAL */
.glass-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 20px 50px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  border-radius: 20px;
}

/* ✨ ANIMATION */
@keyframes modalIn {
  0% {transform: scale(0.8) translateY(30px); opacity: 0;}
  100% {transform: scale(1) translateY(0); opacity: 1;}
}
.animate-modal {
  animation: modalIn 0.25s ease;
}

/* REQUEST CARD */
.request-card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: 0.2s;
}
.request-card:hover {
  background: rgba(255,255,255,0.08);
  transform: scale(1.02);
}

/* BUTTON */
.btn {
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 13px;
  transition: 0.2s;
}
.btn:active {
  transform: scale(0.9);
}
.btn-accept { background: #22c55e; }
.btn-reject { background: #ef4444; }

</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="header p-5 flex justify-between items-center shadow-xl">

    <div class="flex items-center gap-3">
      <img id="avatar"
        class="w-12 h-12 rounded-full object-cover border border-white/20 shadow-lg">

      <div>
        <h1 class="text-lg font-semibold drop-shadow" id="username">Loading...</h1>
        <p class="text-xs opacity-80">Realtime Chat App</p>
      </div>
    </div>

    <!-- 🔔 -->
    <div class="relative">
      <button onclick="toggleRequests()"
        class="text-2xl hover:scale-110 transition">🔔</button>

      <span id="notifCount"
        class="hidden absolute -top-2 -right-2 bg-red-500 text-xs px-1 rounded-full">
        0
      </span>
    </div>

  </div>

  <!-- CONTENT -->
  <iframe id="frame" src="chats.html" class="flex-1 w-full border-0"></iframe>

  <!-- NAVBAR -->
  <div class="navbar flex justify-around py-3 text-xl rounded-t-2xl">
    <button onclick="navigate('chats.html', this)" class="nav-btn active">💬</button>
    <button onclick="navigate('contacts.html', this)" class="nav-btn">👤</button>
    <button onclick="navigate('profile.html', this)" class="nav-btn">⚙️</button>
  </div>

</div>

<!-- 💎 MODAL -->
<div id="requestPopup"
class="hidden fixed inset-0 z-50 flex items-center justify-center
bg-black/70 backdrop-blur-sm">

  <div class="glass-card w-[90%] max-w-sm p-5 animate-modal">

    <div class="flex justify-between items-center mb-4">
      <h2 class="text-lg font-semibold">Friend Requests</h2>
      <button onclick="closeRequests()" class="text-xl opacity-60">✕</button>
    </div>

    <div id="requestList" class="space-y-3 max-h-[300px] overflow-auto"></div>

  </div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

const user = JSON.parse(localStorage.getItem("user") || "{}")

document.getElementById("username").innerText =
  "Hi, " + (user.name || "User")

document.getElementById("avatar").src =
  user.avatar || "https://ui-avatars.com/api/?name=" + (user.name || "User")

// NAVIGATION
function navigate(page, el){
  const frame = document.getElementById("frame")

  frame.style.opacity = 0
  setTimeout(()=>{
    frame.src = page
    frame.style.opacity = 1
  },150)

  document.querySelectorAll(".nav-btn")
    .forEach(b => b.classList.remove("active"))

  el.classList.add("active")
}

// ===== REQUEST =====
let requests = []

async function loadRequests(){
  const res = await fetch(API + "/requests?email=" + user.email)
  requests = await res.json()

  const badge = document.getElementById("notifCount")

  if(requests.length){
    badge.classList.remove("hidden")
    badge.innerText = requests.length
  }else{
    badge.classList.add("hidden")
  }

  renderRequests()
}

function renderRequests(){
  const container = document.getElementById("requestList")

  if(!requests.length){
    container.innerHTML = `<div class="text-center opacity-60 py-6">No requests</div>`
    return
  }

  container.innerHTML = requests.map(r=>`
    <div class="request-card">

      <div class="flex items-center gap-3">
        <img src="https://ui-avatars.com/api/?name=${r.from_email}&background=7c3aed&color=fff"
          class="w-10 h-10 rounded-full">

        <div>
          <p class="text-sm font-medium">${r.from_email}</p>
          <p class="text-xs opacity-50">wants to connect</p>
        </div>
      </div>

      <div class="flex gap-2">
        <button onclick="respond(${r.id}, 'accept')" class="btn btn-accept">✔</button>
        <button onclick="respond(${r.id}, 'reject')" class="btn btn-reject">✕</button>
      </div>

    </div>
  `).join("")
}

async function respond(id, action){
  await fetch(API + "/respond-request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id, action})
  })

  loadRequests()
}

function toggleRequests(){
  document.getElementById("requestPopup").classList.remove("hidden")
}

function closeRequests(){
  document.getElementById("requestPopup").classList.add("hidden")
}

// AUTO LOAD
loadRequests()
setInterval(loadRequests, 5000)

</script>

</body>
</html>
