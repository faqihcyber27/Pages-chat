<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.glass {background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
.tab-active {border-bottom:2px solid #a78bfa;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-5">
<h1>{{user.name}}</h1>

<div class="flex gap-6 mt-3">
<span @click="tab='chats'" :class="tab==='chats'?'tab-active':''">Chats</span>
<span @click="tab='contacts'" :class="tab==='contacts'?'tab-active':''">Contacts</span>
</div>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

<!-- CHATS -->
<div v-if="tab==='chats'">

<div v-if="chats.length===0" class="text-center mt-20">
💬 No chats yet
</div>

<div v-for="c in chats" class="glass p-3 mb-2 rounded-xl">
<p>{{c.user1===user.email?c.user2:c.user1}}</p>
<p class="text-sm opacity-50">{{c.last_message}}</p>
</div>

</div>

<!-- CONTACTS -->
<div v-if="tab==='contacts'">

<button @click="showModal=true"
class="bg-purple-600 px-3 py-1 rounded mb-3">
+ Add Friend
</button>

<div v-for="c in contacts" class="glass p-3 mb-2 rounded-xl">
{{c.name}} ({{c.email}})
</div>

<h3 class="mt-4 mb-2">Requests</h3>

<div v-for="r in requests" class="glass p-3 mb-2 rounded-xl">

<p>{{r.from_email}}</p>

<div class="flex gap-2 mt-2">
<button @click="respond(r.id,'accept')" class="bg-green-500 px-2 rounded">Accept</button>
<button @click="respond(r.id,'reject')" class="bg-red-500 px-2 rounded">Reject</button>
</div>

</div>

</div>

</div>

<!-- MODAL -->
<div v-if="showModal"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-80">

<input v-model="friendEmail"
placeholder="Email"
class="w-full p-2 mb-3 bg-white/10 rounded">

<button @click="sendRequest"
class="bg-purple-600 w-full p-2 rounded">
Send Request
</button>

</div>
</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
tab:'chats',
contacts:[],
chats:[],
requests:[],
showModal:false,
friendEmail:''
}
},

async mounted(){
this.user=JSON.parse(localStorage.getItem("user"))
this.loadAll()
},

methods:{
async loadAll(){
this.contacts=await (await fetch(API+"/contacts?email="+this.user.email)).json()
this.chats=await (await fetch(API+"/chats?email="+this.user.email)).json()
this.requests=await (await fetch(API+"/requests?email="+this.user.email)).json()
},

async sendRequest(){
await fetch(API+"/send-request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
from_email:this.user.email,
to_email:this.friendEmail
})
})
this.showModal=false
this.loadAll()
},

async respond(id,action){
await fetch(API+"/respond-request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,action})
})
this.loadAll()
}
}
}).mount("#app")
</script>

</body>
</html>
