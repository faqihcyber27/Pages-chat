<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Home</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.glass {background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<div class="header p-5 rounded-b-3xl">
<h1>Hi, {{user.name}}</h1>
<p class="text-sm opacity-70">Messages</p>
</div>

<div class="flex-1 overflow-auto p-4 space-y-3">

<div v-for="c in contacts"
@click="openChat(c)"
class="glass p-3 rounded-xl flex items-center gap-3">

<img :src="c.avatar" class="w-10 h-10 rounded-full">

<div class="flex-1">
<p>{{c.name}}</p>
<p class="text-xs opacity-50">Tap to chat</p>
</div>

</div>

</div>

</div>

<script>
Vue.createApp({
data(){
return{
user:{},
contacts:[
{name:'Fanda',avatar:'https://i.pravatar.cc/40?1'},
{name:'Admin',avatar:'https://i.pravatar.cc/40?2'}
]
}
},
mounted(){
this.user=JSON.parse(localStorage.getItem("user"))
},
methods:{
openChat(c){
localStorage.setItem("activeChat",JSON.stringify(c))
location.href="chat.html"
}
}
}).mount("#app")
</script>

</body>
</html>
