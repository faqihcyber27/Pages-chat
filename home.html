<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
}

.active{color:#a78bfa;}

.fast{transition:0.15s;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 flex justify-between">
  <h1>Hi, {{user.name}}</h1>

  <div class="relative">
    🔔
    <span v-if="requests.length"
      class="absolute -top-2 -right-2 bg-red-500 text-xs px-1 rounded-full">
      {{requests.length}}
    </span>
  </div>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

<!-- CHATS -->
<div v-show="tab==='chats'">

<input v-model="search"
placeholder="Search..."
class="w-full p-2 mb-3 bg-white/10 rounded">

<!-- PINNED -->
<div v-if="pinnedChats.length">
<p class="text-xs opacity-60 mb-1">📌 Pinned</p>

<div v-for="c in pinnedChats"
:key="getFriendEmail(c)"
@click="openChat(c)"
@touchstart="startPress(c)"
@touchend="cancelPress"
class="card p-3 mb-2 flex justify-between fast">

<div>
<p>{{getName(c)}} ⭐</p>
<p class="text-xs opacity-60">
{{typingUsers[getFriendEmail(c)] ? 'typing...' : c.last_message}}
</p>
</div>

</div>
</div>

<!-- NORMAL -->
<div v-for="c in normalChats"
:key="getFriendEmail(c)"
@click="openChat(c)"
@touchstart="startPress(c)"
@touchend="cancelPress"
class="card p-3 mb-2 flex justify-between fast">

<div>
<p>{{getName(c)}}</p>
<p class="text-xs opacity-60">
{{typingUsers[getFriendEmail(c)] ? 'typing...' : c.last_message}}
</p>
</div>

<div class="text-right">
<p class="text-xs">{{formatTime(c.updated_at)}}</p>

<div v-if="c.unread>0"
class="bg-red-500 px-2 text-xs rounded">
{{c.unread}}
</div>

<button @click.stop="togglePin(c)">⭐</button>

</div>

</div>

</div>

<!-- CONTACT -->
<div v-show="tab==='contacts'">

<div v-for="c in contacts"
:key="c.email"
class="card p-3 mb-2 flex justify-between fast">

<span>{{c.name}}</span>

<div>
<button @click="startChat(c)">💬</button>
<button @click="deleteContact(c)">🗑</button>
</div>

</div>

</div>

<!-- PROFILE -->
<div v-show="tab==='profile'">

<input v-model="user.name" class="w-full p-2 mb-2 bg-white/10 rounded">
<textarea v-model="user.bio" class="w-full p-2 bg-white/10 rounded"></textarea>

<button @click="saveProfile"
class="mt-2 bg-purple-600 w-full p-2 rounded">
Save
</button>

</div>

</div>

<!-- NAV -->
<div class="flex justify-around p-3 bg-white/10">
<button @click="tab='chats'" :class="{active:tab==='chats'}">💬</button>
<button @click="tab='contacts'" :class="{active:tab==='contacts'}">👤</button>
<button @click="tab='profile'" :class="{active:tab==='profile'}">⚙️</button>
</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
user:{},
tab:'chats',
contacts:[],
chats:[],
requests:[],
search:'',

pinned: JSON.parse(localStorage.getItem("pinned")||"[]"),

typingUsers:{},
pressTimer:null,

ws:null
}
},

computed:{
pinnedChats(){
return this.chats.filter(c=>this.pinned.includes(this.getFriendEmail(c)))
},
normalChats(){
return this.chats.filter(c=>!this.pinned.includes(this.getFriendEmail(c)))
}
},

mounted(){

this.user = JSON.parse(localStorage.getItem("user"))

this.ws = new WebSocket("wss://worker-chat.jihadwajib68.workers.dev/ws?room=global")

this.ws.onopen = ()=>{
this.ws.send(JSON.stringify({type:"online",user:this.user.email}))
this.ws.send(JSON.stringify({type:"init_chats",user:this.user.email}))
this.ws.send(JSON.stringify({type:"init_contacts",user:this.user.email}))
this.ws.send(JSON.stringify({type:"init_requests",user:this.user.email}))
}

this.ws.onmessage = (e)=>{
const msg = JSON.parse(e.data)

// INIT
if(msg.type==="init_chats") this.chats = msg.chats || []
if(msg.type==="init_contacts") this.contacts = msg.contacts || []
if(msg.type==="request_list") this.requests = msg.data || []

// MESSAGE REALTIME
if(msg.type==="message"){

const friend = msg.sender===this.user.email
? msg.room.split("_").find(x=>x!==this.user.email)
: msg.sender

let chat = this.chats.find(c=>this.getFriendEmail(c)===friend)

if(chat){
chat.last_message = msg.text
chat.updated_at = msg.created_at

if(msg.sender!==this.user.email){
chat.unread = (chat.unread||0)+1
}

this.chats = [
{...chat},
...this.chats.filter(c=>this.getFriendEmail(c)!==friend)
]

}else{
this.chats.unshift({
friend_email:friend,
last_message:msg.text,
updated_at:msg.created_at,
unread:1
})
}

}

// TYPING REALTIME
if(msg.type==="typing"){
this.typingUsers[msg.sender]=true

setTimeout(()=>{
delete this.typingUsers[msg.sender]
},800)
}

}

},

methods:{

getFriendEmail(c){
return c.friend_email || (c.user1===this.user.email?c.user2:c.user1)
},

getName(c){
return c.friend_name || this.getFriendEmail(c)
},

formatTime(t){
if(!t) return ''
return new Date(t).toLocaleTimeString()
},

togglePin(c){
const email=this.getFriendEmail(c)

if(this.pinned.includes(email)){
this.pinned = this.pinned.filter(x=>x!==email)
}else{
this.pinned = [email,...this.pinned]
}

localStorage.setItem("pinned",JSON.stringify(this.pinned))
},

// LONG PRESS DELETE
startPress(c){
this.pressTimer=setTimeout(()=>{
this.deleteChat(c)
},600)
},

cancelPress(){
clearTimeout(this.pressTimer)
},

openChat(c){
localStorage.setItem("activeChat",JSON.stringify({
email:this.getFriendEmail(c),
name:this.getName(c)
}))
location.href="chat.html"
},

startChat(c){
localStorage.setItem("activeChat",JSON.stringify({
email:c.email,
name:c.name
}))
location.href="chat.html"
},

async deleteChat(c){
await fetch(API+"/delete-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user1:this.user.email,
user2:this.getFriendEmail(c)
})
})

this.chats=this.chats.filter(x=>this.getFriendEmail(x)!==this.getFriendEmail(c))
},

async deleteContact(c){
await fetch(API+"/delete-contact",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_email:this.user.email,
friend_email:c.email
})
})

this.contacts=this.contacts.filter(x=>x.email!==c.email)
},

async saveProfile(){
await fetch(API+"/update-profile",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this.user)
})

localStorage.setItem("user",JSON.stringify(this.user))
alert("Saved")
}

}

}).mount("#app")
</script>

</body>
</html>
