<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 bg-gradient-to-r from-purple-600 to-pink-500 rounded-b-2xl">
  <h1 class="text-lg font-semibold">Hi, {{user.name}}</h1>
  <p class="text-sm opacity-70">Welcome back</p>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

  <!-- ===== CHATS ===== -->
  <div v-if="tab==='chats'">

    <div class="text-xl mb-3">Chats</div>

    <input v-model="search"
      placeholder="Search..."
      class="w-full p-2 rounded bg-white/10 mb-4">

    <div v-if="loadingChats" class="text-center mt-20 opacity-60">
      Loading chats...
    </div>

    <div v-else-if="filteredChats.length===0"
         class="text-center mt-20 opacity-60">
      No chats yet
    </div>

    <div v-for="c in filteredChats"
         @click="openChat(c)"
         class="p-3 mb-3 rounded-xl bg-white/5 cursor-pointer">

      <p class="font-semibold">
        {{c.friend_name || c.friend_email}}
      </p>

      <p class="text-sm opacity-60">
        {{c.last_message}}
      </p>

    </div>

  </div>

  <!-- ===== CONTACTS ===== -->
  <div v-if="tab==='contacts'">

    <div class="text-xl mb-3">Contacts</div>

    <div v-for="c in filteredContacts"
         @click="startChat(c)"
         class="p-3 mb-3 rounded-xl bg-white/5 cursor-pointer">

      {{c.name}}

    </div>

  </div>

  <!-- ===== PROFILE ===== -->
  <div v-if="tab==='profile'">

    <div class="text-xl mb-4">Profile</div>

    <div class="bg-white/5 p-4 rounded-xl">

      <div class="flex justify-center mb-4">
        <img :src="user.avatar || 'https://i.pravatar.cc/150'"
             class="w-24 h-24 rounded-full">
      </div>

      <div class="mb-3">
        <label class="text-sm opacity-60">Name</label>
        <input v-model="user.name"
          class="w-full p-2 mt-1 rounded bg-white/10">
      </div>

      <div class="mb-3">
        <label class="text-sm opacity-60">Bio</label>
        <textarea v-model="user.bio"
          class="w-full p-2 mt-1 rounded bg-white/10"></textarea>
      </div>

      <button @click="saveProfile"
        class="w-full py-2 mt-2 rounded bg-purple-600">
        Save
      </button>

    </div>

  </div>

</div>

<!-- NAV -->
<div class="flex justify-around p-3 bg-white/5">
  <button @click="tab='chats'">💬</button>
  <button @click="tab='contacts'">👤</button>
  <button @click="tab='profile'">⚙️</button>
</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
chatMap:{},
chats:[],
contacts:[],
search:'',
tab:'chats',

ws:null,
wsRooms:{},

loadingChats:true
}
},

computed:{
filteredChats(){
  return this.chats.filter(c=>{
    const name = (c.friend_name || c.friend_email).toLowerCase()
    return name.includes(this.search.toLowerCase())
  })
},
filteredContacts(){
  return this.contacts
}
},

mounted(){

this.user = JSON.parse(localStorage.getItem("user"))

this.chatMap = {}
this.chats = []
this.loadingChats = true

this.ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.ws.onopen = ()=>{

  this.ws.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  this.ws.send(JSON.stringify({
    type:"init_chats",
    user:this.user.email
  }))

  this.ws.send(JSON.stringify({
    type:"init_contacts",
    user:this.user.email
  }))

  // anti race condition
  setTimeout(()=>{
    this.ws.send(JSON.stringify({
      type:"init_chats",
      user:this.user.email
    }))
  },500)
}

this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // ===== INIT CHATS =====
  if(msg.type === "init_chats"){

    this.chatMap = {}

    ;(msg.chats || []).forEach(c=>{
      this.chatMap[c.friend_email] = c
    })

    this.chatMap = { ...this.chatMap }

    this.chats = Object.values(this.chatMap)
      .sort((a,b)=> new Date(b.updated_at) - new Date(a.updated_at))

    this.loadingChats = false

    this.initRoomSockets()
  }

  // ===== CONTACTS =====
  if(msg.type === "init_contacts"){
    this.contacts = msg.contacts || []
  }

  // ===== REALTIME MESSAGE =====
  if(msg.type === "message"){
    this.handleRealtimeMessage(msg)
  }

  // ===== PROFILE REALTIME 🔥 =====
  if(msg.type === "profile_update"){

    const u = msg.user

    // update contacts
    this.contacts = this.contacts.map(c=>{
      if(c.email === u.email){
        return {...c, ...u}
      }
      return c
    })

    // update chats
    this.chatMap = Object.fromEntries(
      Object.entries(this.chatMap).map(([k,v])=>{
        if(v.friend_email === u.email){
          return [k,{
            ...v,
            friend_name: u.name,
            friend_avatar: u.avatar
          }]
        }
        return [k,v]
      })
    )

    this.chatMap = { ...this.chatMap }

    this.chats = Object.values(this.chatMap)
      .sort((a,b)=> new Date(b.updated_at) - new Date(a.updated_at))

    // update self
    if(u.email === this.user.email){
      this.user = { ...this.user, ...u }
      localStorage.setItem("user", JSON.stringify(this.user))
    }
  }

}

},

methods:{

initRoomSockets(){
  this.chats.forEach(c=>{
    const room = [this.user.email, c.friend_email].sort().join("_")

    if(this.wsRooms[room]) return

    const ws = new WebSocket(
      "wss://worker-chat.jihadwajib68.workers.dev/ws?room="+room
    )

    ws.onmessage = (e)=>{
      const msg = JSON.parse(e.data)
      if(msg.type === "message"){
        this.handleRealtimeMessage(msg)
      }
    }

    this.wsRooms[room] = ws
  })
},

handleRealtimeMessage(msg){

  const friend = msg.sender === this.user.email
    ? msg.room.split("_").find(x=>x!==this.user.email)
    : msg.sender

  let chat = this.chatMap[friend]

  if(chat){
    chat.last_message = msg.text
    chat.updated_at = msg.created_at
  }else{
    this.chatMap[friend] = {
      friend_email: friend,
      friend_name: friend,
      last_message: msg.text,
      updated_at: msg.created_at
    }
  }

  this.chatMap = { ...this.chatMap }

  this.chats = Object.values(this.chatMap)
    .sort((a,b)=> new Date(b.updated_at) - new Date(a.updated_at))
},

openChat(c){
localStorage.setItem("activeChat", JSON.stringify({
  email: c.friend_email,
  name: c.friend_name
}))
window.location.href="chat.html"
},

startChat(c){
localStorage.setItem("activeChat", JSON.stringify({
  email: c.email,
  name: c.name
}))
window.location.href="chat.html"
},

// 🔥 SAVE PROFILE (REALTIME)
saveProfile(){

  localStorage.setItem("user", JSON.stringify(this.user))

  this.ws.send(JSON.stringify({
    type:"profile_update",
    email:this.user.email,
    name:this.user.name,
    bio:this.user.bio,
    avatar:this.user.avatar
  }))
}

}
}).mount("#app")
</script>

</body>
</html>
