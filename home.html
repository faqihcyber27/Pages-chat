<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json">

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 0 0 24px 24px;
  box-shadow:
    0 10px 40px rgba(124,58,237,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px;
}

.nav-btn {
  flex: 1;
  padding: 10px 0;
}

.active { color: #a78bfa; }

/* POPUP */
.popup {
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from {opacity:0; transform:translateY(-10px)}
  to {opacity:1; transform:translateY(0)}
}

/* TOAST */
.toast {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(15,23,42,0.95);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 14px;
  border-radius: 12px;
  display: flex;
  gap: 10px;
  z-index: 9999;
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center mx-2 mt-2 relative">

    <div class="flex items-center gap-3">
      <img id="avatar" class="w-11 h-11 rounded-full ring-2 ring-white/20">
      <div>
        <h1 id="username" class="font-semibold"></h1>
        <p class="text-xs opacity-70">Realtime Chat</p>
      </div>
    </div>

    <!-- 🔔 -->
    <button onclick="toggleRequests()" class="relative text-xl">
      🔔
      <span id="notifBadge"
        class="absolute -top-1 -right-1 bg-red-500 text-[10px] px-1.5 rounded-full hidden">
      </span>
    </button>
  </div>

  <!-- CONTENT -->
  <iframe id="frame" class="flex-1 w-full border-0"></iframe>

  <!-- NAVBAR -->
  <div class="navbar flex text-center text-xl">
    <button onclick="navigate('chats.html', this)" class="nav-btn active">💬</button>
    <button onclick="navigate('contacts.html', this)" class="nav-btn">👤</button>
    <button onclick="navigate('profile.html', this)" class="nav-btn">⚙️</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"))

document.getElementById("username").innerText = "Hi, " + user.name
document.getElementById("avatar").src =
  user.avatar || "https://ui-avatars.com/api/?name=" + user.name

const frame = document.getElementById("frame")
frame.src = "chats.html"

// ================= WS =================
let ws
let requests = []

function connectWS(){

  ws = new WebSocket("wss://worker-chat.jihadwajib68.workers.dev/ws?room=global")

  ws.onopen = ()=>{
    console.log("WS connected")

    ws.send(JSON.stringify({
      type:"online",
      user:user.email
    }))

    ws.send(JSON.stringify({
      type:"init_requests",
      user:user.email
    }))
  }

  ws.onmessage = (e)=>{
    const msg = JSON.parse(e.data)

    // INIT
    if(msg.type === "request_list"){
      requests = msg.data || []
      updateNotif()
    }

    // NEW
    if(msg.type === "new_request"){
      if(msg.data.to_email === user.email){
        requests.unshift(msg.data)
        updateNotif()
        showToast(msg.data.from_email, "sent you a friend request")
      }
    }

    // DELETE / UPDATE
    if(msg.type === "request_update"){
      requests = requests.filter(r => r.id !== msg.id)
      updateNotif()
    }

    // ACCEPTED
    if(msg.type === "request_accepted"){
      if(msg.to === user.email){
        showToast("🎉", "Friend accepted")
      }
    }
  }

  ws.onclose = ()=>{
    console.log("WS reconnecting...")
    setTimeout(connectWS, 1000)
  }

}

connectWS()

// ================= NAV =================
function navigate(page, el){
  document.querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"))

  el.classList.add("active")
  frame.src = page
}

// ================= BADGE =================
function updateNotif(){
  const badge = document.getElementById("notifBadge")

  if(requests.length > 0){
    badge.innerText = requests.length
    badge.classList.remove("hidden")
  }else{
    badge.classList.add("hidden")
  }
}

// ================= POPUP =================
function toggleRequests(){

  let popup = document.getElementById("reqPopup")

  if(popup){
    popup.remove()
    return
  }

  popup = document.createElement("div")
  popup.id = "reqPopup"
  popup.className = "popup absolute right-4 top-20 w-72 rounded-xl bg-slate-900/95 border border-white/10 p-3 shadow-xl"

  if(requests.length === 0){
    popup.innerHTML = `<p class="text-sm opacity-60 text-center py-4">No requests</p>`
  }else{
    popup.innerHTML = requests.map(r=>`

      <div class="flex items-center justify-between mb-3 bg-white/5 p-2 rounded-lg">

        <div class="flex items-center gap-2">
          <img src="https://ui-avatars.com/api/?name=${r.from_email}"
            class="w-9 h-9 rounded-full">

          <div>
            <p class="text-sm font-semibold">${r.from_email}</p>
            <p class="text-xs opacity-50">wants to connect</p>
          </div>
        </div>

        <div class="flex gap-1">
          <button onclick="respond(${r.id}, 'accept')"
            class="bg-green-500 px-2 py-1 rounded text-xs">✔</button>

          <button onclick="respond(${r.id}, 'reject')"
            class="bg-red-500 px-2 py-1 rounded text-xs">✖</button>
        </div>

      </div>

    `).join("")
  }

  document.body.appendChild(popup)
}

// ================= RESPOND (FULL WS) =================
function respond(id, action){

  if(ws && ws.readyState === 1){
    ws.send(JSON.stringify({
      type:"respond_request",
      id,
      action
    }))
  }

  // instant UI
  requests = requests.filter(r=>r.id !== id)
  updateNotif()

  document.getElementById("reqPopup")?.remove()
}

// ================= TOAST =================
function showToast(title, text){

  const old = document.getElementById("toast")
  if(old) old.remove()

  const toast = document.createElement("div")
  toast.id = "toast"
  toast.className = "toast"

  toast.innerHTML = `
    <div>
      <p class="text-sm font-semibold">${title}</p>
      <p class="text-xs opacity-60">${text}</p>
    </div>
  `

  document.body.appendChild(toast)

  setTimeout(()=>{
    toast.remove()
  },3000)
}
</script>

</body>
</html>
