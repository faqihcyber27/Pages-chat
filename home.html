<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.chat-card,.contact-card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;
}
.search-bar{
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.1);
}
.bottom-nav{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
}
.active-nav{color:#a78bfa;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 flex justify-between items-center">
  <div>
    <h1 class="font-semibold">Hi, {{user.name}}</h1>
  </div>

  <div class="relative">
    <button @click="showRequests=true">🔔</button>
    <span v-if="requests.length"
      class="absolute -top-2 -right-2 bg-red-500 text-xs px-1 rounded-full">
      {{requests.length}}
    </span>
  </div>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

<!-- CHATS -->
<div v-if="tab==='chats'">

<input v-model="search"
placeholder="Search..."
class="search-bar w-full p-3 rounded-xl mb-4">

<div v-if="filteredChats.length===0"
class="text-center opacity-50 mt-10">
No chats
</div>

<div v-for="c in filteredChats"
:key="getFriendEmail(c)"
@click="openChat(c)"
class="chat-card p-3 mb-3 flex justify-between cursor-pointer">

<div class="flex gap-3 items-center">

<div class="w-10 h-10 rounded-full flex items-center justify-center"
:style="{background:getColor(getName(c))}">
{{getInitial(getName(c))}}
</div>

<div>
<p class="font-semibold">
{{getName(c)}}
</p>

<p class="text-sm opacity-60">
{{c.last_message || 'No message'}}
</p>
</div>

</div>

<div class="text-right">
<p class="text-xs opacity-50">
{{formatTime(c.updated_at)}}
</p>

<div v-if="c.unread>0"
class="bg-red-500 text-xs px-2 rounded-full">
{{c.unread}}
</div>
</div>

</div>

</div>

<!-- CONTACTS -->
<div v-if="tab==='contacts'">

<input v-model="search"
placeholder="Search..."
class="search-bar w-full p-3 rounded-xl mb-4">

<div v-for="c in filteredContacts"
:key="c.email"
@click="startChat(c)"
class="contact-card p-3 mb-3 flex justify-between cursor-pointer">

<div class="flex gap-3 items-center">
<img :src="c.avatar || 'https://i.pravatar.cc/40'"
class="w-10 h-10 rounded-full">

<p>{{c.name}}</p>
</div>

<button @click.stop="startChat(c)">💬</button>

</div>

</div>

</div>

<!-- NAV -->
<div class="bottom-nav fixed bottom-3 left-1/2 -translate-x-1/2 w-[90%] flex justify-around py-3 rounded-2xl">

<button @click="tab='chats'"
:class="tab==='chats'?'active-nav':''">💬</button>

<button @click="tab='contacts'"
:class="tab==='contacts'?'active-nav':''">👤</button>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({

data(){
return{
user:{},
tab:'chats',
contacts:[],
chats:[],
requests:[],
search:'',
showRequests:false,

onlineUsers:[],
ws:null
}
},

computed:{
filteredChats(){
return this.chats.filter(c=>
this.getName(c).toLowerCase().includes(this.search.toLowerCase())
)
},
filteredContacts(){
return this.contacts.filter(c=>
c.name?.toLowerCase().includes(this.search.toLowerCase())
)
}
},

mounted(){

this.user = JSON.parse(localStorage.getItem("user"))

this.ws = new WebSocket(
"wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

this.ws.onopen = ()=>{
this.ws.send(JSON.stringify({type:"online",user:this.user.email}))
this.ws.send(JSON.stringify({type:"init_chats",user:this.user.email}))
this.ws.send(JSON.stringify({type:"init_contacts",user:this.user.email}))
this.ws.send(JSON.stringify({type:"init_requests",user:this.user.email}))
}

this.ws.onmessage = (e)=>{
const msg = JSON.parse(e.data)

// INIT
if(msg.type==="init_chats") this.chats = msg.chats || []
if(msg.type==="init_contacts") this.contacts = msg.contacts || []
if(msg.type==="request_list") this.requests = msg.data || []
if(msg.type==="online_list") this.onlineUsers = msg.users || []

// REALTIME CHAT
if(msg.type==="message"){

const text = msg.text || "📎 File"

const friend = msg.sender===this.user.email
? msg.room.split("_").find(x=>x!==this.user.email)
: msg.sender

let chat = this.chats.find(c=>this.getFriendEmail(c)===friend)

if(chat){
chat.last_message = text
chat.updated_at = msg.created_at

if(msg.sender!==this.user.email){
chat.unread = (chat.unread||0)+1
}

this.chats = [
{...chat},
...this.chats.filter(c=>this.getFriendEmail(c)!==friend)
]

}else{
this.chats.unshift({
friend_email:friend,
friend_name:friend,
last_message:text,
updated_at:msg.created_at,
unread: msg.sender!==this.user.email?1:0
})
}

}

}

},

methods:{

getFriendEmail(c){
return c.friend_email || (c.user1===this.user.email ? c.user2 : c.user1)
},

getName(c){
return c.friend_name || this.getFriendEmail(c)
},

getInitial(n){
return n?.charAt(0).toUpperCase()
},

getColor(n){
const colors=["#7c3aed","#4f46e5","#059669","#dc2626"]
let h=0
for(let i=0;i<n.length;i++){
h=n.charCodeAt(i)+((h<<5)-h)
}
return colors[Math.abs(h)%colors.length]
},

formatTime(t){
if(!t) return ''
return new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
},

openChat(c){

const email = this.getFriendEmail(c)

localStorage.setItem("activeChat",JSON.stringify({
email,
name:this.getName(c)
}))

location.href="chat.html"
},

startChat(c){
localStorage.setItem("activeChat",JSON.stringify({
email:c.email,
name:c.name
}))
location.href="chat.html"
}

}

}).mount("#app")
</script>

</body>
</html>
