<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: linear-gradient(180deg, #0f172a, #020617);
  color: white;
}

/* smooth iframe */
#frame {
  transition: opacity 0.2s ease;
}

/* navbar glass */
.navbar {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.1);
}

/* active button */
.active {
  color: #a78bfa;
}
</style>
</head>

<body>

<script>
// 🔒 PROTECT LOGIN
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="p-4 bg-gradient-to-r from-purple-600 via-indigo-500 to-pink-500 shadow-lg">
    <h1 class="text-lg font-semibold" id="username">Loading...</h1>
    <p class="text-xs opacity-80">Realtime Chat App</p>
  </div>

  <!-- CONTENT -->
  <iframe id="frame"
    src="chats.html"
    class="flex-1 w-full border-0">
  </iframe>

  <!-- NAVBAR -->
  <div class="navbar flex justify-around py-3 text-xl">

    <button onclick="navigate('chats.html', this)" class="active">
      💬
    </button>

    <button onclick="navigate('contacts.html', this)">
      👤
    </button>

    <button onclick="navigate('profile.html', this)">
      ⚙️
    </button>

  </div>

</div>

<script>
// 🔥 LOAD USER NAME
const user = JSON.parse(localStorage.getItem("user") || "{}")
document.getElementById("username").innerText = "Hi, " + (user.name || "User")

// 🔥 NAVIGATION
function navigate(page, el){
  const frame = document.getElementById("frame")

  // fade out
  frame.style.opacity = 0

  setTimeout(()=>{
    frame.src = page
    frame.style.opacity = 1
  },150)

  // active state
  document.querySelectorAll(".navbar button")
    .forEach(b => b.classList.remove("active"))

  el.classList.add("active")
}
</script>

</body>
</html>
