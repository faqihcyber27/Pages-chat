<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json">

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 0 0 24px 24px;
  box-shadow:
    0 10px 40px rgba(124,58,237,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  position: relative;
  z-index: 20;
}
.header::after {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at right top, rgba(255,255,255,0.2), transparent 60%);
  pointer-events: none;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow:
    0 10px 30px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.05);
  padding: 8px;
  z-index: 30;
}

.nav-btn {
  flex: 1;
  padding: 10px 0;
  border-radius: 14px;
  transition: 0.25s;
  position: relative;
}
.active { color: #a78bfa; }
.active::before {
  content:"";
  position:absolute;
  inset:0;
  border-radius:inherit;
  background: rgba(124,58,237,0.25);
  filter: blur(10px);
  z-index:-1;
}

#frame {
  transition: opacity 0.25s ease;
}

/* MODAL */
.glass-card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
}

/* REQUEST */
.request-card {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 12px;
  display: flex;
  justify-content: space-between;
}

/* TOAST */
#toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8);
  padding: 10px 16px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
  z-index: 999;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center mx-2 mt-2">

    <div class="flex items-center gap-3">
      <img id="avatar"
        class="w-11 h-11 rounded-full object-cover border border-white/20">

      <div>
        <h1 class="text-base font-semibold" id="username"></h1>
        <p class="text-xs opacity-70">Realtime Chat</p>
      </div>
    </div>

    <!-- 🔔 -->
    <div class="relative">
      <button onclick="toggleRequests()" class="text-xl">🔔</button>

      <span id="notifCount"
        class="hidden absolute -top-2 -right-2 bg-red-500 text-[10px] px-1.5 rounded-full">
        0
      </span>
    </div>

  </div>

  <!-- CONTENT -->
  <iframe id="frame" src="chats.html" class="flex-1 w-full border-0"></iframe>

  <!-- NAVBAR -->
  <div class="navbar flex justify-around text-xl">
    <button onclick="navigate('chats.html', this)" class="nav-btn active">💬</button>
    <button onclick="navigate('contacts.html', this)" class="nav-btn">👤</button>
    <button onclick="navigate('profile.html', this)" class="nav-btn">⚙️</button>
  </div>

</div>

<!-- REQUEST MODAL -->
<div id="requestPopup"
class="hidden fixed inset-0 flex items-center justify-center bg-black/70">

  <div class="glass-card w-[90%] max-w-sm p-5">

    <div class="flex justify-between mb-3">
      <h2>Friend Requests</h2>
      <button onclick="closeRequests()">✕</button>
    </div>

    <div id="requestList"></div>

  </div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"
const user = JSON.parse(localStorage.getItem("user"))

// 🔥 FIREBASE INIT
const firebaseConfig = {
  apiKey: "AIzaSyCASPxiCM8V8OIzw3JaeTdGreID0EMyTMk",
  authDomain: "chat-realtime-7b092.firebaseapp.com",
  projectId: "chat-realtime-7b092",
  storageBucket: "chat-realtime-7b092.firebasestorage.app",
  messagingSenderId: "424831780632",
  appId: "1:424831780632:web:6e42d806ea94392778406d"
}

firebase.initializeApp(firebaseConfig)

const messaging = firebase.messaging()
messaging.onMessage((payload)=>{
  console.log("NOTIF MASUK:", payload)

  if(Notification.permission === "granted"){
    new Notification(payload.notification.title, {
      body: payload.notification.body
    })
  }
})

document.getElementById("username").innerText =
  "Hi, " + user.name

document.getElementById("avatar").src =
  user.avatar || "https://ui-avatars.com/api/?name=" + user.name

function navigate(page, el){
  const frame = document.getElementById("frame")
  frame.style.opacity = 0
  setTimeout(()=>{
    frame.src = page
    frame.style.opacity = 1
  },150)

  document.querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"))

  el.classList.add("active")
}

let requests = []

function updateBadge(){
  const badge = document.getElementById("notifCount")
  if(requests.length){
    badge.classList.remove("hidden")
    badge.innerText = requests.length
  }else{
    badge.classList.add("hidden")
  }
}

function renderRequests(){
  const el = document.getElementById("requestList")

  if(!requests.length){
    el.innerHTML = `<div class="text-center opacity-60">No requests</div>`
    return
  }

  el.innerHTML = requests.map(r=>`
    <div class="request-card mb-2">

      <div class="flex items-center gap-2">
        <img src="${r.avatar || 'https://i.pravatar.cc/40'}"
           class="w-8 h-8 rounded-full">
        <p class="text-sm">${r.name || r.from_email}</p>
      </div>

      <div class="flex gap-2">
        <button onclick="respond(${r.id},'accept')">✔</button>
        <button onclick="respond(${r.id},'reject')">✕</button>
      </div>

    </div>
  `).join("")
}

async function respond(id, action){
  await fetch(API+"/respond-request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({id, action})
  })
}

function toggleRequests(){
  document.getElementById("requestPopup").classList.remove("hidden")
}
function closeRequests(){
  document.getElementById("requestPopup").classList.add("hidden")
}

function showToast(msg){
  const t = document.getElementById("toast")
  t.innerText = msg
  t.classList.add("show")
  setTimeout(()=>t.classList.remove("show"),2000)
}

// 🔥 INIT FCM
async function initFCM(){

  const permission = await Notification.requestPermission()

  if(permission !== "granted"){
    console.log("notif ditolak")
    return
  }

  const reg = await navigator.serviceWorker.ready

const token = await messaging.getToken({
  vapidKey: "BMicSwmyrhTRTPuFZO-S2pm3ymIZ43RT-KcnQnWw2Z0_TIwDPRLa1EZLPNiSiwkoKiDQxNt7cNJQD3f3iCCgwb0",
  serviceWorkerRegistration: reg
})

  console.log("TOKEN:", token)

  await fetch(API + "/save-token", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      token,
      email: user.email
    })
  })
}

//// 🔥 WEBSOCKET GLOBAL
const ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"
)

// 🔥 REGISTER SW
navigator.serviceWorker.register("/firebase-messaging-sw.js")
.then(()=>{
  initFCM()
})

ws.onopen = ()=>{
  ws.send(JSON.stringify({
    type:"online",
    user:user.email
  }))

  // 🔥 TAMBAHAN WAJIB
  ws.send(JSON.stringify({
    type:"init_requests",
    user:user.email
  }))
}

ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // 📥 FULL LIST
  if(msg.type==="request_list"){
    requests = msg.data || []
    updateBadge()
    renderRequests()
  }

  // ➕ NEW REQUEST
  if(msg.type==="new_request" && msg.data.to_email === user.email){
  requests.unshift(msg.data)
  updateBadge()
  renderRequests()
}

if(msg.type==="push_notification"){

  if(Notification.permission === "granted"){
    new Notification(msg.title, {
      body: msg.body
    })
  }
}

  if(msg.type === "contact_request"){
  if(msg.to === user.email){
    ws.send(JSON.stringify({
      type:"init_requests",
      user:user.email
    }))
  }
}

  // ❌ REMOVE
  if(msg.type==="request_update"){
    requests = requests.filter(r=>r.id!==msg.id)
    updateBadge()
    renderRequests()
  }

  // 🎉 ACCEPT TOAST
  if(msg.type==="request_accepted" && msg.to === user.email){
    showToast(msg.name + " menerima pertemanan 🎉")
  }
}
</script>

</body>
</html>
