<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json">

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 0 0 24px 24px;
  box-shadow:
    0 10px 40px rgba(124,58,237,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px;
}

.nav-btn {
  flex: 1;
  padding: 10px 0;
}

.active { color: #a78bfa; }
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center mx-2 mt-2 relative">
    <div class="flex items-center gap-3">
      <img id="avatar" class="w-11 h-11 rounded-full">
      <div>
        <h1 id="username"></h1>
        <p class="text-xs opacity-70">Realtime Chat</p>
      </div>
    </div>

    <!-- 🔔 NOTIF -->
    <button onclick="toggleRequests()" style="position:relative">
      🔔
      <span id="notifBadge"
        style="position:absolute;top:-5px;right:-5px;
               background:red;font-size:10px;
               padding:2px 6px;border-radius:999px;
               display:none">
      </span>
    </button>
  </div>

  <!-- CONTENT -->
  <iframe id="frame" class="flex-1 w-full border-0"></iframe>

  <!-- NAVBAR -->
  <div class="navbar flex text-center text-xl">
    <button onclick="navigate('chats.html', this)" class="nav-btn active">💬</button>
    <button onclick="navigate('contacts.html', this)" class="nav-btn">👤</button>
    <button onclick="navigate('profile.html', this)" class="nav-btn">⚙️</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"))

document.getElementById("username").innerText = "Hi, " + user.name
document.getElementById("avatar").src =
  user.avatar || "https://ui-avatars.com/api/?name=" + user.name

const frame = document.getElementById("frame")
frame.src = "chats.html"

// ================= GLOBAL WS =================
let ws = new WebSocket("wss://worker-chat.jihadwajib68.workers.dev/ws?room=global")

let requests = []

ws.onopen = ()=>{
  ws.send(JSON.stringify({
    type:"init_requests",
    user:user.email
  }))
}

ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // INIT
  if(msg.type === "request_list"){
    requests = msg.data || []
    updateNotif()
  }

  // NEW REQUEST
  if(msg.type === "new_request"){
    if(msg.data.to_email === user.email){
      requests.unshift(msg.data)
      updateNotif()
    }
  }

  // UPDATE (ACCEPT / DELETE)
  if(msg.type === "request_update"){
    requests = requests.filter(r => r.id !== msg.id)
    updateNotif()
  }
}

// ================= NAVIGATION =================
function navigate(page, el){
  document.querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"))

  el.classList.add("active")
  frame.src = page
}

// ================= BADGE =================
function updateNotif(){
  const badge = document.getElementById("notifBadge")

  if(requests.length > 0){
    badge.innerText = requests.length
    badge.style.display = "inline-block"
  }else{
    badge.style.display = "none"
  }
}

// ================= POPUP =================
function toggleRequests(){

  let popup = document.getElementById("reqPopup")

  if(popup){
    popup.remove()
    return
  }

  popup = document.createElement("div")
  popup.id = "reqPopup"

  popup.style.position = "absolute"
  popup.style.top = "80px"
  popup.style.right = "20px"
  popup.style.background = "#020617"
  popup.style.border = "1px solid rgba(255,255,255,0.1)"
  popup.style.borderRadius = "12px"
  popup.style.padding = "10px"
  popup.style.width = "260px"
  popup.style.zIndex = "999"

  if(requests.length === 0){
    popup.innerHTML = `<p class="text-sm opacity-60">No requests</p>`
  }else{
    popup.innerHTML = requests.map(r=>`
      <div style="margin-bottom:12px">
        <p style="font-size:14px">${r.from_email}</p>
        <div style="margin-top:6px;display:flex;gap:6px">
          <button onclick="respond(${r.id}, 'accept')"
            style="background:#16a34a;padding:5px 10px;border-radius:6px">Accept</button>
          <button onclick="respond(${r.id}, 'reject')"
            style="background:#dc2626;padding:5px 10px;border-radius:6px">Reject</button>
        </div>
      </div>
    `).join("")
  }

  document.body.appendChild(popup)
}

// ================= RESPOND =================
async function respond(id, action){

  await fetch("https://worker-chat.jihadwajib68.workers.dev/respond-request",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ id, action })
  })

  requests = requests.filter(r=>r.id !== id)
  updateNotif()

  const popup = document.getElementById("reqPopup")
  if(popup) popup.remove()
}
</script>

</body>
</html>
