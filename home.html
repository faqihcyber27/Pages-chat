<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="manifest" href="/manifest.json">

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 0 0 24px 24px;
  box-shadow:
    0 10px 40px rgba(124,58,237,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 8px;
}

.nav-btn {
  flex: 1;
  padding: 10px 0;
}

.active { color: #a78bfa; }
</style>
</head>

<body>

<script>
if(!localStorage.getItem("user")){
  location.href = "index.html"
}
</script>

<div class="h-screen flex flex-col">

  <!-- HEADER -->
  <div class="header p-4 flex justify-between items-center mx-2 mt-2">
    <div class="flex items-center gap-3">
      <img id="avatar" class="w-11 h-11 rounded-full">
      <div>
        <h1 id="username"></h1>
        <p class="text-xs opacity-70">Realtime Chat</p>
      </div>
    </div>
    <button onclick="toggleRequests()">🔔</button>
  </div>

  <!-- CONTENT (FULL IFRAME) -->
  <iframe id="frame" class="flex-1 w-full border-0"></iframe>

  <!-- NAVBAR -->
  <div class="navbar flex text-center text-xl">
    <button onclick="navigate('chats.html', this)" class="nav-btn active">💬</button>
    <button onclick="navigate('contacts.html', this)" class="nav-btn">👤</button>
    <button onclick="navigate('profile.html', this)" class="nav-btn">⚙️</button>
  </div>

</div>

<script>
const user = JSON.parse(localStorage.getItem("user"))

document.getElementById("username").innerText = "Hi, " + user.name
document.getElementById("avatar").src =
  user.avatar || "https://ui-avatars.com/api/?name=" + user.name

const frame = document.getElementById("frame")

// 🔥 DEFAULT LOAD
frame.src = "chats.html"

function navigate(page, el){

  // set active button
  document.querySelectorAll(".nav-btn")
    .forEach(b=>b.classList.remove("active"))

  el.classList.add("active")

  // load page
  frame.src = page
}
</script>

</body>
</html>
