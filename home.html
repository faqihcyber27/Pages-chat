<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>

<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}

.chat-card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: 0.3s;
}
.chat-card:hover {transform: scale(1.02);}

.navbar {
  position: fixed;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 92%;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);
  padding: 8px;
}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 bg-gradient-to-r from-purple-600 to-indigo-600">
  <h1 class="text-lg font-semibold">Hi, {{user.name}}</h1>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto">

  <!-- ================= CHATS ================= -->
  <div v-if="tab==='chats'">

    <div class="px-4 mt-4 text-xl font-semibold">Chats</div>

    <div class="px-4 mt-3">
      <input v-model="search"
        placeholder="Search..."
        class="w-full p-3 rounded-xl bg-white/10 border border-white/10">
    </div>

    <!-- PINNED -->
    <div v-if="pinnedChats.length" class="px-4 mt-4">
      <p class="text-xs opacity-60 mb-2">📌 Pinned</p>

      <div v-for="c in pinnedChats"
           @click="openChat(c)"
           class="chat-card p-4 mb-3 rounded-2xl flex justify-between cursor-pointer border border-yellow-400/20">

        <div class="flex items-center gap-3">

          <img v-if="c.friend_avatar"
            :src="c.friend_avatar"
            class="w-10 h-10 rounded-full">

          <div v-else
            :style="{ background: getColor(getName(c)) }"
            class="w-10 h-10 rounded-full flex items-center justify-center">
            {{ getInitial(getName(c)) }}
          </div>

          <div>
            <p class="font-semibold">
              {{ getName(c) }}
              <span v-if="isOnline(c.friend_email)" class="text-green-400">●</span>
            </p>

            <p class="text-sm">
              <span v-if="typingUsers[c.friend_email]" class="text-green-400">
                sedang mengetik...
              </span>
              <span v-else>{{c.last_message}}</span>
            </p>
          </div>

        </div>

        <div>
          <button @click.stop="togglePin(c)">⭐</button>
        </div>

      </div>
    </div>

    <!-- LIST -->
    <div class="px-4 mt-4">

      <div v-for="c in normalChats"
           @click="openChat(c)"
           class="chat-card p-4 mb-3 flex justify-between cursor-pointer">

        <div>
          <p>{{ getName(c) }}</p>
          <p class="text-sm opacity-60">
            <span v-if="typingUsers[c.friend_email]" class="text-green-400">
              sedang mengetik...
            </span>
            <span v-else>{{c.last_message}}</span>
          </p>
        </div>

        <div>
          <span v-if="c.unread>0" class="bg-red-500 px-2 rounded-full">
            {{c.unread}}
          </span>
        </div>

      </div>

    </div>

  </div>

  <!-- ================= CONTACTS ================= -->
  <div v-if="tab==='contacts'" class="p-4">
    <h2 class="text-xl mb-3">Contacts</h2>
    <div v-for="c in contacts" class="chat-card mb-2 p-3">
      {{c.name}}
    </div>
  </div>

  <!-- ================= PROFILE ================= -->
  <div v-if="tab==='profile'" class="p-4">
    <h2 class="text-xl mb-3">Profile</h2>
    <input v-model="user.name" class="w-full p-2 bg-white/10 rounded mb-2">
    <button @click="saveProfile" class="bg-purple-600 p-2 rounded w-full">
      Save
    </button>
  </div>

</div>

<!-- NAVBAR -->
<div class="navbar flex justify-around text-xl">
  <button @click="tab='chats'">💬</button>
  <button @click="tab='contacts'">👤</button>
  <button @click="tab='profile'">⚙️</button>
</div>

</div>

<script>
const WS_URL = "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
tab:'chats',

chats:[],
chatMap:{}, // 🔥 NEW

contacts:[],
onlineUsers:[],
typingUsers:{},

wsGlobal:null,
wsRooms:{},

pinned: JSON.parse(localStorage.getItem("pinned")||"[]")
}
},

computed:{
pinnedChats(){
  return this.chats.filter(c=>this.pinned.includes(c.friend_email))
},
normalChats(){
  return this.chats.filter(c=>!this.pinned.includes(c.friend_email))
}
},

mounted(){

this.wsGlobal = new WebSocket(WS_URL)

this.wsGlobal.onopen = ()=>{
  this.wsGlobal.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  this.wsGlobal.send(JSON.stringify({
    type:"init_chats",
    user:this.user.email
  }))
}

this.wsGlobal.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // 🔥 INIT (MERGE, BUKAN REPLACE)
  if(msg.type==="init_chats"){

    ;(msg.chats || []).forEach(c=>{
      this.chatMap[c.friend_email] = {
        ...this.chatMap[c.friend_email],
        ...c,
        unread: this.chatMap[c.friend_email]?.unread || 0
      }
    })

    this.syncChats()
    this.$nextTick(()=>this.initRoomSockets())
  }

  if(msg.type==="online_list"){
    this.onlineUsers = msg.users || []
  }
}

},

methods:{

// 🔥 CORE SYNC
syncChats(){

  let arr = Object.values(this.chatMap)

  arr.sort((a,b)=>{
    const aPinned = this.pinned.includes(a.friend_email)
    const bPinned = this.pinned.includes(b.friend_email)

    if(aPinned && !bPinned) return -1
    if(!aPinned && bPinned) return 1

    return new Date(b.updated_at) - new Date(a.updated_at)
  })

  this.chats = arr
},

initRoomSockets(){

this.chats.forEach(c=>{

const room = [this.user.email,c.friend_email].sort().join("_")

if(this.wsRooms[room]) return

const ws = new WebSocket(
  "wss://worker-chat.jihadwajib68.workers.dev/ws?room="+room
)

ws.onmessage = (e)=>{
const msg = JSON.parse(e.data)

// 🔥 TYPING
if(msg.type==="typing"){
  if(msg.sender===this.user.email) return

  this.typingUsers = {
    ...this.typingUsers,
    [msg.sender]: true
  }

  setTimeout(()=>{
    const t = {...this.typingUsers}
    delete t[msg.sender]
    this.typingUsers = t
  },1000)
}

// 🔥 MESSAGE REALTIME (NO RELOAD)
if(msg.type==="message"){

  const messageText = msg.text || "📎 File"

  const friend = msg.sender === this.user.email
    ? msg.room.split("_").find(x=>x!==this.user.email)
    : msg.sender

  let chat = this.chatMap[friend]

  if(chat){

    chat.last_message = messageText
    chat.updated_at = msg.created_at

    if(msg.sender !== this.user.email){
      chat.unread = (chat.unread || 0) + 1
    }

  }else{

    this.chatMap[friend] = {
      friend_email: friend,
      friend_name: friend,
      last_message: messageText,
      updated_at: msg.created_at,
      unread: msg.sender !== this.user.email ? 1 : 0
    }

  }

  this.syncChats()
}

}

this.wsRooms[room]=ws

})

},

togglePin(c){
  const i = this.pinned.indexOf(c.friend_email)

  if(i>-1){
    this.pinned.splice(i,1)
  }else{
    this.pinned.push(c.friend_email)
  }

  localStorage.setItem("pinned", JSON.stringify(this.pinned))

  this.syncChats() // 🔥 langsung update UI
},

openChat(c){
  localStorage.setItem("activeChat", JSON.stringify({
    email:c.friend_email,
    name:c.friend_name
  }))
  window.location.href="chat.html"
},

getName(c){ return c.friend_name || c.friend_email },
getInitial(n){ return n.charAt(0).toUpperCase() },

getColor(n){
const colors=["#7c3aed","#4f46e5","#059669","#dc2626"]
return colors[n.length % colors.length]
},

isOnline(email){
  return this.onlineUsers.includes(email)
}

}

}).mount("#app")
</script>

</body>
</html>
