<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="p-4 bg-gradient-to-r from-purple-600 to-pink-500">
  <h1 class="text-lg font-semibold">
    {{ activeChat ? activeChat.name : 'Hi, ' + user.name }}
  </h1>
</div>

<!-- CONTENT -->
<div class="flex-1 flex flex-col overflow-hidden">

<!-- ================= CHAT ================= -->
<div v-if="activeChat" class="flex flex-col h-full">

  <div class="p-2 flex justify-between">
    <button @click="closeChat">⬅</button>
    <button @click="deleteChat(activeChat.email)">🗑</button>
  </div>

  <div ref="chatBox" class="flex-1 overflow-auto p-3">

    <div v-for="m in messages"
         :class="m.sender===user.email ? 'text-right' : ''"
         class="mb-2">

      <div class="inline-block px-3 py-2 rounded bg-white/10">
        {{m.text}}
      </div>

    </div>

    <div v-if="typingUsers[activeChat.email]"
         class="text-green-400 text-sm">
      typing...
    </div>

  </div>

  <div class="p-3 flex gap-2 border-t border-white/10">

    <input v-model="messageInput"
      @input="debouncedTyping"
      class="flex-1 p-2 rounded bg-white/10"
      placeholder="Message...">

    <button @click="sendMessage"
      class="px-4 bg-purple-600 rounded">
      Send
    </button>

  </div>

</div>

<!-- ================= LIST ================= -->
<div v-else class="flex-1 overflow-auto p-4">

  <div v-for="c in chats"
       @click="openChat(c)"
       class="p-3 mb-3 bg-white/5 rounded-xl cursor-pointer">

    <div class="flex justify-between">
      <span>{{c.friend_name}}</span>
      <span v-if="onlineUsers.includes(c.friend_email)">🟢</span>
    </div>

    <div class="text-sm"
         :class="typingUsers[c.friend_email] ? 'text-green-400':'opacity-60'">

      <span v-if="typingUsers[c.friend_email]">typing...</span>
      <span v-else>{{c.last_message}}</span>

    </div>

  </div>

</div>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},

ws:null,
wsRooms:{},

chatMap:{},
chats:[],

messages:[],
activeChat:null,
messageInput:'',

typingUsers:{},
onlineUsers:[],

typingTimeout:null
}
},

mounted(){

this.user = JSON.parse(localStorage.getItem("user"))

// ⚡ LOAD CACHE
const cache = localStorage.getItem("chat_cache")
if(cache){
  this.chats = JSON.parse(cache)
}

// GLOBAL WS
this.ws = new WebSocket(API.replace("https","wss")+"/ws?room=global")

this.ws.onopen=()=>{
  this.ws.send(JSON.stringify({type:"online",user:this.user.email}))
  this.ws.send(JSON.stringify({type:"init_chats",user:this.user.email}))
}

this.ws.onmessage=(e)=>{
  const msg=JSON.parse(e.data)

  if(msg.type==="init_chats"){
    this.chatMap={}
    msg.chats.forEach(c=>this.chatMap[c.friend_email]=c)

    this.chats=Object.values(this.chatMap)

    // ⚡ SAVE CACHE
    localStorage.setItem("chat_cache", JSON.stringify(this.chats))
  }

  if(msg.type==="typing"){
    this.typingUsers[msg.sender]=true
    setTimeout(()=>delete this.typingUsers[msg.sender],1000)
  }

  if(msg.type==="online_list"){
    this.onlineUsers=msg.users
  }
}
},

methods:{

getRoom(e){
  return [this.user.email,e].sort().join("_")
},

openChat(c){

  this.activeChat={
    email:c.friend_email,
    name:c.friend_name
  }

  const room=this.getRoom(c.friend_email)

  // ⚡ LAZY WS
  if(!this.wsRooms[room]){

    const ws=new WebSocket(API.replace("https","wss")+"/ws?room="+room)

    ws.onopen=()=>{
      ws.send(JSON.stringify({type:"init_messages",room}))
    }

    ws.onmessage=(e)=>{
      const msg=JSON.parse(e.data)

      if(msg.type==="init_messages"){
        this.messages=msg.messages
        this.scroll()
      }

      if(msg.type==="message"){
        this.messages.push(msg)
        this.handleList(msg)
        this.scroll()
      }

      if(msg.type==="typing"){
        this.typingUsers[msg.sender]=true
        setTimeout(()=>delete this.typingUsers[msg.sender],1000)
      }

    }

    this.wsRooms[room]=ws
  }

},

closeChat(){
  this.activeChat=null
  this.messages=[]
},

sendMessage(){

  if(!this.messageInput) return

  const room=this.getRoom(this.activeChat.email)

  this.wsRooms[room].send(JSON.stringify({
    type:"message",
    room,
    sender:this.user.email,
    text:this.messageInput
  }))

  this.messageInput=''
},

debouncedTyping(){

  clearTimeout(this.typingTimeout)

  this.typingTimeout=setTimeout(()=>{
    this.sendTyping()
  },300)
},

sendTyping(){

  const room=this.getRoom(this.activeChat.email)

  this.wsRooms[room].send(JSON.stringify({
    type:"typing",
    room,
    sender:this.user.email
  }))
},

handleList(msg){

  const friend = msg.sender===this.user.email
    ? msg.room.split("_").find(x=>x!==this.user.email)
    : msg.sender

  this.chatMap[friend]={
    ...this.chatMap[friend],
    friend_email:friend,
    last_message:msg.text,
    updated_at:msg.created_at
  }

  this.chats = [
    this.chatMap[friend],
    ...Object.values(this.chatMap).filter(c=>c.friend_email!==friend)
  ]

  localStorage.setItem("chat_cache", JSON.stringify(this.chats))
},

scroll(){
  this.$nextTick(()=>{
    const el=this.$refs.chatBox
    if(el) el.scrollTop=el.scrollHeight
  })
},

async deleteChat(email){
  const room=this.getRoom(email)
  await fetch(API+"/delete-chat",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({room})
  })
}

}
}).mount("#app")
</script>

</body>
</html>
