<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.glass {background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
.active {color:#a78bfa;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-5 flex justify-between items-center">
  <div>
    <h1 class="text-lg font-semibold">Hi, {{user.name}}</h1>
    <p class="text-sm opacity-70">Welcome back</p>
  </div>

  <button @click="showRequests=true" class="text-2xl">🔔</button>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

<!-- CHATS -->
<div v-if="tab==='chats'">

<div v-if="chats.length===0" class="text-center mt-20 opacity-60">
No chats yet
</div>

<div v-for="c in chats"
     @click="openChat(c)"
     @touchstart="startChatPress(c)"
     @touchend="cancelPress"
     class="glass p-4 mb-3 rounded-xl flex justify-between items-center cursor-pointer">

  <div>
    <p class="font-semibold">{{c.friend_name}}</p>
    <p class="text-sm opacity-50">{{c.last_message}}</p>
  </div>

  <p class="text-xs opacity-50">
    {{ formatTime(c.updated_at) }}
  </p>

</div>

</div>

<!-- CONTACTS -->
<div v-if="tab==='contacts'">

<button @click="showModal=true"
class="bg-purple-600 w-full p-2 rounded mb-4">
+ Add Friend
</button>

<div v-for="c in contacts"
     @touchstart="startPress(c)"
     @touchend="cancelPress"
     class="glass p-3 mb-2 rounded-xl">

  {{c.name}}

</div>

</div>

</div>

<!-- FLOAT BUTTON -->
<button v-if="tab==='chats'"
@click="showSelectChat=true"
class="fixed bottom-20 right-6 w-14 h-14 bg-purple-600 rounded-full text-2xl">
+
</button>

<!-- NAV -->
<div class="glass flex justify-around p-4">
<button @click="tab='chats'" :class="tab==='chats'?'active':''">💬</button>
<button @click="tab='contacts'" :class="tab==='contacts'?'active':''">👤</button>
</div>

<!-- DELETE CHAT -->
<div v-if="selectedChat"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-72 text-center">

<p class="mb-4">
Delete chat with {{selectedChat.friend_name}}?
</p>

<button @click="deleteChat"
class="bg-red-500 w-full p-2 rounded mb-2">
Delete
</button>

<button @click="selectedChat=null"
class="bg-gray-600 w-full p-2 rounded">
Cancel
</button>

</div>
</div>

<!-- START CHAT -->
<div v-if="showSelectChat"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-80">

<h2 class="mb-3">Start Chat</h2>

<div v-for="c in contacts"
     @click="startChat(c)"
     class="p-2 border-b cursor-pointer">

  {{c.name}}

</div>

<button @click="showSelectChat=false"
class="mt-3 w-full bg-gray-600 p-2 rounded">
Close
</button>

</div>
</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
tab:'chats',
contacts:[],
chats:[],
showSelectChat:false,
showModal:false,
showRequests:false,
selectedChat:null,
pressTimer:null
}
},

async mounted(){
this.user=JSON.parse(localStorage.getItem("user"))
this.loadAll()

setInterval(()=>this.loadAll(),2000)
},

methods:{

async loadAll(){
this.contacts=await (await fetch(API+"/contacts?email="+this.user.email)).json()
this.chats=await (await fetch(API+"/chats?email="+this.user.email)).json()
},

formatTime(t){
return new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
},

openChat(c){
localStorage.setItem("activeChat", JSON.stringify({
  email:c.friend_email,
  name:c.friend_name
}))
window.location.href="chat.html"
},

startChat(c){
localStorage.setItem("activeChat", JSON.stringify({
  email:c.email,
  name:c.name
}))
window.location.href="chat.html"
},

// 🔥 LONG PRESS CHAT
startChatPress(c){
this.pressTimer=setTimeout(()=>{
  this.selectedChat=c
},600)
},

cancelPress(){
clearTimeout(this.pressTimer)
},

// 🔥 DELETE CHAT
async deleteChat(){
await fetch(API+"/delete-chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user1:this.user.email,
user2:this.selectedChat.friend_email
})
})

this.selectedChat=null
this.loadAll()
}

}
}).mount("#app")
</script>

</body>
</html>
