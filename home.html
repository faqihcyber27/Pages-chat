<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.glass {background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
.active {color:#a78bfa;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-5 flex justify-between items-center">
  <div>
    <h1 class="text-lg font-semibold">Hi, {{user.name}}</h1>
    <p class="text-sm opacity-70">Welcome back</p>
  </div>

  <div class="relative">
    <button @click="showRequests=true" class="text-2xl">🔔</button>
    <span v-if="requests.length"
      class="absolute -top-2 -right-2 bg-red-500 text-xs px-1 rounded-full">
      {{requests.length}}
    </span>
  </div>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

  <!-- ===== CHATS ===== -->
  <div v-if="tab==='chats'">

    <div class="text-3xl mb-4">💬</div>

    <div v-if="chats.length===0" class="text-center mt-20 opacity-60">
      No chats yet
    </div>

    <div v-for="c in chats"
         @click="openChat(c)"
         class="glass p-4 mb-3 rounded-xl flex justify-between items-center cursor-pointer">

      <div>
        <p class="font-semibold">
          {{c.user1===user.email?c.user2:c.user1}}
        </p>

        <p class="text-sm opacity-50 truncate max-w-[200px]">
          {{c.last_message}}
        </p>
      </div>

      <!-- 🔴 UNREAD -->
      <div v-if="c.unread > 0"
           class="bg-red-500 text-xs px-2 py-1 rounded-full">
        {{c.unread}}
      </div>

    </div>

  </div>

  <!-- ===== CONTACTS ===== -->
  <div v-if="tab==='contacts'">

    <div class="text-3xl mb-4">👤</div>

    <button @click="showModal=true"
      class="bg-purple-600 px-4 py-2 rounded-lg mb-4 w-full">
      + Add Friend
    </button>

    <div v-if="filteredContacts.length===0" class="text-center mt-20 opacity-60">
      No contacts yet
    </div>

    <div v-for="c in filteredContacts"
         @touchstart="startPress(c)"
         @touchend="cancelPress"
         class="glass p-3 mb-3 rounded-xl flex items-center gap-3">

      <img src="https://i.pravatar.cc/40"
           class="w-10 h-10 rounded-full">

      <p class="font-medium">{{c.name}}</p>

    </div>

  </div>

</div>

<!-- FLOAT BUTTON CHAT -->
<button v-if="tab==='chats'"
  @click="showSelectChat=true"
  class="fixed bottom-20 right-6 w-14 h-14 rounded-full bg-purple-600 text-2xl shadow-lg">
  +
</button>

<!-- BOTTOM NAV -->
<div class="glass flex justify-around p-4 text-xl">
  <button @click="tab='chats'" :class="tab==='chats'?'active':''">💬</button>
  <button @click="tab='contacts'" :class="tab==='contacts'?'active':''">👤</button>
</div>

<!-- ADD FRIEND -->
<div v-if="showModal"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-80">

<h2 class="mb-3">Add Friend</h2>

<input v-model="friendEmail"
placeholder="Email"
class="w-full p-2 mb-3 bg-white/10 rounded">

<button @click="sendRequest"
class="bg-purple-600 w-full p-2 rounded">
Send Request
</button>

</div>
</div>

<!-- REQUEST POPUP -->
<div v-if="showRequests"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-80">

<h2 class="mb-3">Requests</h2>

<div v-for="r in requests" class="mb-3">

<p>{{r.from_email}}</p>

<div class="flex gap-2 mt-2">
<button @click="respond(r.id,'accept')" class="bg-green-500 px-2 rounded">Accept</button>
<button @click="respond(r.id,'reject')" class="bg-red-500 px-2 rounded">Reject</button>
</div>

</div>

<button @click="showRequests=false"
class="mt-3 w-full bg-gray-600 p-2 rounded">
Close
</button>

</div>
</div>

<!-- DELETE CONTACT -->
<div v-if="selectedContact"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-72 text-center">

<p class="mb-4">Delete {{selectedContact.name}}?</p>

<div class="flex gap-2">
<button @click="deleteContact"
class="bg-red-500 flex-1 p-2 rounded">Delete</button>

<button @click="selectedContact=null"
class="bg-gray-600 flex-1 p-2 rounded">Cancel</button>
</div>

</div>
</div>

<!-- START CHAT -->
<div v-if="showSelectChat"
class="fixed inset-0 bg-black/60 flex items-center justify-center">

<div class="glass p-5 rounded-xl w-80 max-h-[400px] overflow-auto">

<h2 class="mb-3">Start Chat</h2>

<div v-for="c in filteredContacts"
     @click="startChat(c)"
     class="flex items-center gap-3 p-2 rounded hover:bg-white/10 cursor-pointer">

  <img src="https://i.pravatar.cc/40"
       class="w-8 h-8 rounded-full">

  <p>{{c.name}}</p>

</div>

<button @click="showSelectChat=false"
class="mt-3 w-full bg-gray-600 p-2 rounded">
Close
</button>

</div>
</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
tab:'chats',
contacts:[],
chats:[],
requests:[],
showModal:false,
showRequests:false,
showSelectChat:false,
friendEmail:'',
selectedContact:null,
pressTimer:null
}
},

computed:{
filteredContacts(){
const seen=new Set()
return this.contacts.filter(c=>{
if(seen.has(c.email)) return false
seen.add(c.email)
return true
})
}
},

async mounted(){
this.user=JSON.parse(localStorage.getItem("user"))
this.loadAll()
},

methods:{
async loadAll(){
this.contacts=await (await fetch(API+"/contacts?email="+this.user.email)).json()
this.chats=await (await fetch(API+"/chats?email="+this.user.email)).json()
this.requests=await (await fetch(API+"/requests?email="+this.user.email)).json()
},

openChat(c){
const email = c.user1===this.user.email ? c.user2 : c.user1
localStorage.setItem("activeChat", JSON.stringify({email}))
window.location.href="chat.html"
},

startChat(c){
localStorage.setItem("activeChat", JSON.stringify(c))
window.location.href="chat.html"
},

async sendRequest(){
await fetch(API+"/send-request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
from_email:this.user.email,
to_email:this.friendEmail
})
})
this.showModal=false
this.loadAll()
},

async respond(id,action){
await fetch(API+"/respond-request",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id,action})
})
this.loadAll()
},

startPress(c){
this.pressTimer=setTimeout(()=>{
this.selectedContact=c
},600)
},

cancelPress(){
clearTimeout(this.pressTimer)
},

async deleteContact(){
await fetch(API+"/delete-contact",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
user_email:this.user.email,
friend_email:this.selectedContact.email
})
})
this.selectedContact=null
this.loadAll()
}
}
}).mount("#app")
</script>

</body>
</html>
