<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {background:#020617;color:white;}
.glass {background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);}
.header {background:linear-gradient(135deg,#7c3aed,#4f46e5);}
.active {color:#a78bfa;}
</style>
</head>

<body>

<div id="app" class="h-screen flex flex-col">

<!-- HEADER -->
<div class="header p-5 flex justify-between items-center">
  <div>
    <h1 class="text-lg font-semibold">Hi, {{user.name}}</h1>
    <p class="text-sm opacity-70">Welcome back</p>
  </div>

  <div class="relative">
    <button @click="showRequests=true" class="text-2xl">🔔</button>
    <span v-if="requests.length"
      class="absolute -top-2 -right-2 bg-red-500 text-xs px-1 rounded-full">
      {{requests.length}}
    </span>
  </div>
</div>

<!-- CONTENT -->
<div class="flex-1 overflow-auto p-4">

  <!-- ===== CHATS ===== -->
  <div v-if="tab==='chats'">

    <div class="text-3xl mb-4">💬</div>

    <div v-if="chats.length===0" class="text-center mt-20 opacity-60">
      No chats yet
    </div>

    <!-- CHAT LIST -->
    <div v-for="c in chats"
         @click="openChat(c)"
         @touchstart="startChatPress(c)"
         @touchend="cancelPress"
         class="glass p-4 mb-3 rounded-xl flex justify-between items-center cursor-pointer">

      <!-- LEFT -->
      <div class="flex items-center gap-3">

        <img src="https://i.pravatar.cc/40"
             class="w-10 h-10 rounded-full">

        <div>
          <p class="font-semibold">
            {{c.friend_name || (c.user1===user.email?c.user2:c.user1)}}
          </p>

          <p class="text-sm opacity-50 truncate max-w-[180px]">
            {{c.last_message}}
          </p>
        </div>

      </div>

      <!-- RIGHT -->
      <div class="text-right">

        <p class="text-xs opacity-50">
          {{ formatTime(c.updated_at) }}
        </p>

        <!-- 🔴 UNREAD FIX -->
        <div v-if="unreadMap[getEmail(c)] > 0"
             class="bg-red-500 text-xs px-2 py-1 rounded-full mt-1">
          {{ unreadMap[getEmail(c)] }}
        </div>

      </div>

    </div>

  </div>

  <!-- ===== CONTACTS ===== -->
  <div v-if="tab==='contacts'">

    <div class="text-3xl mb-4">👤</div>

    <button @click="showModal=true"
      class="bg-purple-600 px-4 py-2 rounded-lg mb-4 w-full">
      + Add Friend
    </button>

    <div v-if="contacts.length===0" class="text-center mt-20 opacity-60">
      No contacts yet
    </div>

    <div v-for="c in contacts"
         @touchstart="startPress(c)"
         @touchend="cancelPress"
         class="glass p-3 mb-3 rounded-xl flex items-center gap-3">

      <img src="https://i.pravatar.cc/40"
           class="w-10 h-10 rounded-full">

      <p class="font-medium">{{c.name}}</p>

    </div>

  </div>

</div>

<!-- FLOAT BUTTON -->
<button v-if="tab==='chats'"
  @click="showSelectChat=true"
  class="fixed bottom-20 right-6 w-14 h-14 rounded-full bg-purple-600 text-2xl shadow-lg">
  +
</button>

<!-- BOTTOM NAV -->
<div class="glass flex justify-around p-4 text-xl">
  <button @click="tab='chats'" :class="tab==='chats'?'active':''">💬</button>
  <button @click="tab='contacts'" :class="tab==='contacts'?'active':''">👤</button>
</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
user:{},
tab:'chats',
contacts:[],
chats:[],
requests:[],
unreadMap:{}, // 🔥 NEW
showModal:false,
showRequests:false,
showSelectChat:false,
friendEmail:'',
selectedContact:null,
selectedChat:null,
pressTimer:null
}
},

async mounted(){
this.user=JSON.parse(localStorage.getItem("user"))
this.loadAll()
setInterval(()=>this.loadAll(),2000)
},

methods:{

getEmail(c){
  return c.friend_email || (c.user1===this.user.email?c.user2:c.user1)
},

async loadAll(){
this.contacts=await (await fetch(API+"/contacts?email="+this.user.email)).json()
this.chats=await (await fetch(API+"/chats?email="+this.user.email)).json()
this.requests=await (await fetch(API+"/requests?email="+this.user.email)).json()

await this.calculateUnread()
},

async calculateUnread(){
  for(const c of this.chats){

    const email = this.getEmail(c)
    const room = [this.user.email, email].sort().join("_")

    const res = await fetch(API+"/messages?room="+room)
    const msgs = await res.json()

    this.unreadMap[email] = msgs.filter(m =>
      m.sender !== this.user.email && !m.is_read
    ).length
  }
},

formatTime(t){
return new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
},

openChat(c){

const email = this.getEmail(c)
const room = [this.user.email, email].sort().join("_")

// 🔥 MARK AS READ (NON BLOCKING)
fetch(API+"/mark-read",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
room:room,
user:this.user.email
})
})

// 🔥 LANGSUNG HAPUS UNREAD DI UI
this.unreadMap[email] = 0

localStorage.setItem("activeChat", JSON.stringify({
  email: email,
  name: c.friend_name
}))
window.location.href="chat.html"
},

startChat(c){
localStorage.setItem("activeChat", JSON.stringify({
  email: c.email,
  name: c.name
}))
window.location.href="chat.html"
},

startChatPress(c){
this.pressTimer=setTimeout(()=>{
  this.selectedChat=c
},600)
},

cancelPress(){
clearTimeout(this.pressTimer)
}

}
}).mount("#app")
</script>

</body>
</html>
