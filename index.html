<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth</title>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
}

/* GLASS */
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(25px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* INPUT */
.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  outline: none;
  transition: 0.2s;
}
.input:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 10px rgba(124,58,237,0.5);
}

/* BUTTON */
.btn {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  transition: 0.2s;
}
.btn:active {
  transform: scale(0.95);
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(20px);
  padding: 10px 18px;
  border-radius: 12px;
  opacity: 0;
  transition: 0.3s;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body class="flex items-center justify-center h-screen text-white">

<div id="app" class="w-full max-w-sm px-4">

<div class="glass rounded-2xl p-6 shadow-xl">

<h2 class="text-center text-xl font-semibold mb-5">
{{ isLogin ? 'Welcome Back 👋' : 'Create Account ✨' }}
</h2>

<input v-if="!isLogin" v-model="name"
placeholder="Name"
class="input w-full mb-3 px-4 py-3 rounded-xl">

<input v-model="email"
placeholder="Email"
class="input w-full mb-3 px-4 py-3 rounded-xl">

<input type="password" v-model="password"
placeholder="Password"
class="input w-full mb-4 px-4 py-3 rounded-xl">

<button @click="submit"
:disabled="loading"
class="btn w-full py-3 rounded-xl font-semibold">

<span v-if="!loading">
{{ isLogin ? 'Login' : 'Register' }}
</span>

<span v-else>
Loading...
</span>

</button>

<p class="text-center mt-4 text-sm opacity-70">
<a href="#" @click="isLogin=!isLogin">
{{ isLogin ? 'Create account' : 'Already have account?' }}
</a>
</p>

</div>
<!-- TOAST -->
<div :class="['toast', showToast ? 'show' : '']">
  {{toastMsg}}
</div>
</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){
return{
isLogin:true,
name:'',
email:'',
password:'',
loading:false,
showToast:false,
toastMsg:''
}
},

methods:{

toast(msg){
  this.toastMsg = msg
  this.showToast = true
  setTimeout(()=>this.showToast=false,2000)
},

async submit(){

if(!this.email || !this.password || (!this.isLogin && !this.name)){
  this.toast("Isi semua field dulu ⚠️")
  return
}

this.loading = true

try{
const res = await fetch(API + (this.isLogin ? "/login" : "/register"), {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({
    name: this.name,
    email: this.email,
    password: this.password
  })
})

const d=await res.json()

if(d.token){
  localStorage.setItem("user",JSON.stringify(d.user))
  this.toast("Login berhasil 🚀")

  setTimeout(()=>{
    location.href="home.html"
  },800)

}else{
  this.toast(d.error || "Gagal")
}

}catch(e){
  this.toast("Server error ⚠️")
}

this.loading = false
}

}

}).mount("#app")
</script>

</body>
</html>
