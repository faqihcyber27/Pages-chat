<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/vue@3"></script>
</head>

<body class="bg-black text-white">

<div id="app" class="h-screen">

<!-- ================= AUTH PAGE ================= -->
<div v-if="!token" class="h-full flex items-center justify-center">

  <div class="bg-gray-900 p-6 rounded-xl w-full max-w-sm">

    <h2 class="text-center text-xl mb-4">
      {{ isLogin ? 'Login' : 'Register' }}
    </h2>

    <input v-model="email" placeholder="Email"
      class="w-full p-3 mb-3 bg-gray-800 rounded">

    <input v-model="password" type="password" placeholder="Password"
      class="w-full p-3 mb-3 bg-gray-800 rounded">

    <input v-if="!isLogin" v-model="name" placeholder="Name"
      class="w-full p-3 mb-3 bg-gray-800 rounded">

    <button @click="submit"
      class="w-full bg-blue-500 p-3 rounded">
      {{ isLogin ? 'Login' : 'Register' }}
    </button>

    <div class="text-center mt-3">
      <button @click="isLogin=!isLogin" class="text-blue-400">
        Switch
      </button>
    </div>

  </div>

</div>

<!-- ================= CHAT PAGE ================= -->
<div v-else class="h-full flex flex-col bg-gray-100 text-black">

  <!-- HEADER -->
  <div class="bg-blue-500 text-white p-3 flex justify-between">
    <span>{{ user?.name }}</span>
    <button @click="logout">Logout</button>
  </div>

  <!-- CHAT -->
  <div ref="box" class="flex-1 overflow-auto p-2">

    <div v-for="m in chat"
      :class="m.me ? 'text-right' : ''">

      <div class="inline-block bg-white p-2 m-1 rounded">
        <b>{{ m.user }}</b><br>
        {{ m.msg }}
      </div>

    </div>

  </div>

  <!-- TYPING -->
  <div v-if="typing" class="text-xs px-2">
    {{ typing }} mengetik...
  </div>

  <!-- INPUT -->
  <div class="flex p-2 gap-2 bg-white">

    <input v-model="msg"
      @input="sendTyping"
      @keydown.enter="send"
      class="flex-1 border p-2 rounded">

    <button @click="send"
      class="bg-blue-500 text-white px-4 rounded">
      Send
    </button>

  </div>

</div>

</div>

<script>
const { createApp } = Vue;

createApp({
data(){
return{
isLogin:true,
email:"",
password:"",
name:"",
token:localStorage.getItem("token"),
ws:null,
msg:"",
chat:[],
user:null,
typing:""
}
},

async mounted(){

if(this.token){
  await this.loadUser();
  this.connectWS();
}

},

methods:{

// ================= AUTH =================

async submit(){

const url = this.isLogin ? "/login" : "/register";

const res = await fetch("https://chat-realtime.jihadwajib68.workers.dev"+url,{
  method:"POST",
  body:JSON.stringify({
    email:this.email,
    password:this.password,
    name:this.name
  })
});

if(this.isLogin){
  const data = await res.json();

  localStorage.setItem("token",data.token);
  this.token = data.token;

  await this.loadUser();
  this.connectWS();

}else{
  alert("Register sukses");
  this.isLogin=true;
}
},

logout(){
localStorage.removeItem("token");
location.reload();
},

async loadUser(){
const res = await fetch(
"https://chat-realtime.jihadwajib68.workers.dev/me",
{headers:{Authorization:this.token}}
);

this.user = await res.json();
},

// ================= CHAT =================

connectWS(){

this.ws = new WebSocket(
"wss://chat-realtime.jihadwajib68.workers.dev?token="+this.token
);

this.ws.onmessage=(e)=>{
const d = JSON.parse(e.data);

if(d.type==="typing"){
this.typing = d.user;
setTimeout(()=>this.typing="",1000);
return;
}

this.chat.push({...d,me:false});
this.scroll();
};

},

send(){
if(!this.msg) return;

const payload={
type:"message",
msg:this.msg
};

this.ws.send(JSON.stringify(payload));

this.chat.push({
...payload,
user:this.user.name,
me:true
});

this.msg="";
},

sendTyping(){
this.ws.send(JSON.stringify({type:"typing"}));
},

scroll(){
this.$nextTick(()=>{
this.$refs.box.scrollTop=this.$refs.box.scrollHeight;
});
}

}
}).mount("#app");
</script>

</body>
</html>
