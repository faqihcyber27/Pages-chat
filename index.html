<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}
.neon {
  box-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6;
}
</style>
</head>

<body class="flex items-center justify-center h-screen text-white">

<div id="app" class="w-full max-w-sm px-4">

<div class="glass p-6 rounded-xl">

<h2 class="text-center mb-4">{{ isLogin?'Login':'Register' }}</h2>

<input v-if="!isLogin" v-model="name" placeholder="Name" class="w-full mb-2 p-2 rounded bg-white/10">
<input v-model="email" placeholder="Email" class="w-full mb-2 p-2 rounded bg-white/10">
<input type="password" v-model="password" placeholder="Password" class="w-full mb-2 p-2 rounded bg-white/10">

<button @click="submit" class="bg-blue-500 w-full p-2 rounded neon">
{{ isLogin?'Login':'Register' }}
</button>

<p class="text-center mt-3">
<a href="#" @click="isLogin=!isLogin">
{{ isLogin?'Register':'Login' }}
</a>
</p>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){return{isLogin:true,name:'',email:'',password:''}},
methods:{
async submit(){
const res=await fetch(API+(this.isLogin?"/login":"/register"),{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this)
})
const d=await res.json()
if(d.token){
localStorage.setItem("user",JSON.stringify(d.user))
location.href="home.html"
}else alert(d.error)
}
}
}).mount("#app")
</script>

</body>
</html>
