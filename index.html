<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auth</title>

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: radial-gradient(circle at top, #0f172a, #020617);
}
.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
}
.neon {
  box-shadow: 0 0 10px #3b82f6, 0 0 20px #3b82f6;
}
.input {
  background: rgba(255,255,255,0.05);
}
</style>
</head>

<body class="flex items-center justify-center h-screen text-white">

<div id="app" class="w-full max-w-sm px-4">

<div class="glass rounded-2xl p-6">

<h2 class="text-center text-xl mb-4">
{{ isLogin ? 'Welcome Back' : 'Create Account' }}
</h2>

<input v-if="!isLogin" v-model="name" placeholder="Name" class="input w-full mb-3 px-4 py-2 rounded-lg">
<input v-model="email" placeholder="Email" class="input w-full mb-3 px-4 py-2 rounded-lg">
<input type="password" v-model="password" placeholder="Password" class="input w-full mb-4 px-4 py-2 rounded-lg">

<button @click="submit" class="w-full py-2 bg-blue-500 rounded-lg neon">
{{ isLogin ? 'Login' : 'Register' }}
</button>

<p class="text-center mt-4 text-sm">
<a href="#" @click="isLogin=!isLogin">
{{ isLogin ? 'Register' : 'Login' }}
</a>
</p>

</div>

</div>

<script>
const API="https://worker-chat.jihadwajib68.workers.dev"

Vue.createApp({
data(){return{isLogin:true,name:'',email:'',password:''}},
methods:{
async submit(){
const res=await fetch(API+(this.isLogin?"/login":"/register"),{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(this)
})
const d=await res.json()

if(d.token){
localStorage.setItem("user",JSON.stringify(d.user))
location.href="home.html"
}else alert(d.error)
}
}
}).mount("#app")
</script>

</body>
</html>
