<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/vue@3"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  background: #020617;
  color: white;
}

.profile-header {
  background: linear-gradient(135deg, #7c3aed, #4f46e5);
  border-radius: 20px;
  padding: 30px 20px;
  text-align: center;
}

.input {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
}

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,20,30,0.9);
  padding: 10px 16px;
  border-radius: 12px;
  opacity: 0;
  transition: .3s;
}
.toast.show { opacity:1; }
</style>
</head>

<body>

<div id="app" class="p-4">

<!-- HEADER -->
<div class="profile-header">

  <div class="relative inline-block">
    <img :src="user.avatar || defaultAvatar"
         class="w-24 h-24 rounded-full object-cover">

    <input type="file" ref="file" @change="changeAvatar" class="hidden">

    <button @click="$refs.file.click()"
      class="absolute bottom-0 right-0 bg-white/20 p-2 rounded-full">
      ✏️
    </button>
  </div>

  <h2 class="mt-3 font-semibold">{{user.name}}</h2>
  <p class="text-sm opacity-60">{{user.bio || 'No bio'}}</p>

</div>

<!-- FORM -->
<div class="mt-6 space-y-3">

  <input v-model="user.name"
    class="input w-full p-3 rounded-xl"
    placeholder="Name">

  <textarea v-model="user.bio"
    class="input w-full p-3 rounded-xl"
    placeholder="Bio"></textarea>

</div>

<!-- ACTION -->
<div class="mt-6 space-y-3">

  <button @click="save"
    :disabled="loading"
    class="w-full bg-purple-600 py-3 rounded-xl">

    <span v-if="loading">Saving...</span>
    <span v-else>Save</span>

  </button>

  <button @click="logout"
    class="w-full bg-red-500 py-3 rounded-xl">
    Logout
  </button>

</div>

<!-- TOAST -->
<div :class="['toast', showToast && 'show']">
  {{toast}}
</div>

</div>

<script>
const WS_URL = "wss://worker-chat.jihadwajib68.workers.dev/ws?room=global"

Vue.createApp({

data(){
return{
user: JSON.parse(localStorage.getItem("user")),
ws:null,
loading:false,
toast:'',
showToast:false,
defaultAvatar:"https://ui-avatars.com/api/?name=User"
}
},

mounted(){

this.connectWS()

},

methods:{

// ================= WS =================
connectWS(){

this.ws = new WebSocket(WS_URL)

this.ws.onopen = ()=>{

  // online presence
  this.ws.send(JSON.stringify({
    type:"online",
    user:this.user.email
  }))

  // 🔥 GET PROFILE (NO FETCH)
  this.ws.send(JSON.stringify({
    type:"get_profile",
    email:this.user.email
  }))
}

this.ws.onmessage = (e)=>{
  const msg = JSON.parse(e.data)

  // INIT PROFILE
  if(msg.type==="profile_data"){
    if(!msg.user) return
    this.user = msg.user
    localStorage.setItem("user", JSON.stringify(this.user))
  }

  // UPDATE PROFILE (REALTIME)
  if(msg.type==="profile_update"){
    if(msg.user.email !== this.user.email) return

    this.user = msg.user
    localStorage.setItem("user", JSON.stringify(this.user))

    this.loading = false
    this.toastMsg("Profile updated ✅")
  }
}

// 🔥 reconnect auto (important production)
this.ws.onclose = ()=>{
  setTimeout(()=>this.connectWS(),2000)
}

},

// ================= ACTION =================
save(){

if(!this.ws || this.ws.readyState !== 1){
  this.toastMsg("Connection lost ❌")
  return
}

this.loading = true

this.ws.send(JSON.stringify({
  type:"profile_update",
  email:this.user.email,
  name:this.user.name,
  bio:this.user.bio,
  avatar:this.user.avatar
}))

},

changeAvatar(e){

const file = e.target.files[0]
if(!file) return

const reader = new FileReader()
reader.onload = ()=>{
  this.user.avatar = reader.result
}
reader.readAsDataURL(file)

},

logout(){
  localStorage.removeItem("user")
  parent.location.href="index.html"
},

// ================= UI =================
toastMsg(msg){
  this.toast = msg
  this.showToast = true
  setTimeout(()=>this.showToast=false,2000)
}

}

}).mount("#app")
</script>

</body>
</html>
